<!-- Hardening: no external connections except the design-system fonts; blocks exfiltration even if markup injection were ever possible. -->
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'unsafe-inline' https://telegram.org; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:; connect-src https://empjrokwgnsfczqpdvrp.supabase.co; base-uri 'none'; form-action 'none'">
<meta name="description" content="Match Pairing — tournament pairing manager for Swiss-system and round-robin events: pairings, results, FIDE-verified tiebreaks, standings and crosstable. Runs entirely in your browser.">
<title>Match Pairing — Tournament Manager</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23496175'/%3E%3Ctext x='32' y='44' font-family='Arial,Helvetica,sans-serif' font-size='36' font-weight='800' fill='%23fff' text-anchor='middle'%3ES%3C/text%3E%3C/svg%3E">

<!-- Theme BEFORE first paint (no FOUC): OS scheme immediately, then the
     Telegram Mini App bridge loads ASYNC (never parser-blocking — an
     unreachable telegram.org must not stall first paint) and, inside the
     Telegram webview, takes over the theme and wires up the app.
     Accent is left unset → Halcyon defaults to "slate". -->
<script>
  (function () {
    var setTheme = function (dark) {
      document.documentElement.setAttribute("data-theme", dark ? "dark" : "light");
    };
    var mq = matchMedia("(prefers-color-scheme: dark)");
    setTheme(mq.matches);
    mq.addEventListener && mq.addEventListener("change", function () {
      if (!window.__tgThemed) setTheme(mq.matches);
    });
    var s = document.createElement("script");
    s.src = "https://telegram.org/js/telegram-web-app.js";
    s.onload = function () {
      var tg = window.Telegram && window.Telegram.WebApp;
      if (!(tg && tg.platform && tg.platform !== "unknown")) return; // plain browser: stay on OS theme
      var tgTheme = function () { try { setTheme(tg.colorScheme === "dark"); } catch (e) {} };
      window.__tgThemed = true;
      tgTheme();
      try { tg.onEvent && tg.onEvent("themeChanged", tgTheme); } catch (e) {}
      try { tg.ready && tg.ready(); } catch (e) {}
      try { tg.expand && tg.expand(); } catch (e) {}
      // score entry scrolls; don't let a swipe minimize the app mid-round
      try { tg.disableVerticalSwipes && tg.disableVerticalSwipes(); } catch (e) {}
      // let the app know the bridge is up (session-mode routing hooks on this)
      try { document.dispatchEvent(new Event("tg-ready")); } catch (e) {}
    };
    document.head.appendChild(s);
  })();
</script>

<meta name="theme-color" media="(prefers-color-scheme: light)" content="#FAFAF9">

<style>
/* App layout & components — every visual driven by Halcyon design tokens.
   (Palette, fonts, reset & theming come from halcyon-ds/styles.css.) */
*{-webkit-tap-highlight-color:transparent}
.wrap{max-width:var(--container-lg);margin:0 auto;padding:18px 16px 80px}
header.app{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:14px}
header.app h1{font-size:var(--text-xl);margin:0;font-weight:var(--weight-extrabold);letter-spacing:var(--tracking-tight)}
header.app .sub{color:var(--text-muted);font-size:var(--text-sm);margin-top:2px}
.logo{width:38px;height:38px;border-radius:var(--radius-md);
  background:linear-gradient(135deg,var(--accent),var(--accent-active));
  display:grid;place-items:center;color:var(--accent-fg);font-weight:var(--weight-extrabold);font-size:18px;flex:0 0 auto}
.spacer{flex:1}
.statusbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-card);padding:8px 12px;
  box-shadow:var(--shadow-sm);min-width:86px}
.stat .k{font-family:var(--font-mono);font-size:var(--text-2xs);color:var(--text-faint);text-transform:uppercase;letter-spacing:var(--tracking-wider)}
.stat .v{font-size:var(--text-xl);font-weight:var(--weight-bold);font-variant-numeric:tabular-nums}
nav.tabs{display:flex;gap:2px;background:var(--bg-sunken);border:1px solid var(--border-subtle);border-radius:var(--radius-md);
  padding:4px;box-shadow:var(--shadow-xs);margin-bottom:16px;overflow:auto}
nav.tabs button{flex:1;border:0;background:transparent;color:var(--text-muted);font-family:var(--font-sans);
  font-weight:var(--weight-medium);font-size:var(--text-sm);padding:8px 12px;border-radius:var(--radius-sm);
  cursor:pointer;white-space:nowrap;min-width:max-content;transition:var(--transition)}
nav.tabs button:hover{color:var(--text)}
nav.tabs button.active{background:var(--surface);color:var(--text);box-shadow:var(--shadow-xs)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-card);box-shadow:var(--shadow-sm);
  padding:var(--space-5);margin-bottom:14px}
.card h2{margin:0 0 12px;font-size:var(--text-lg);font-weight:var(--weight-semibold)}
.card h2 .hint{font-weight:var(--weight-regular);color:var(--text-muted);font-size:var(--text-sm)}
.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
input,select,textarea{font-family:var(--font-sans);font-size:var(--text-sm);color:var(--text);background:var(--surface);
  border:1px solid var(--border-strong);border-radius:var(--radius-control);height:var(--control-md);padding:0 11px;outline:none;
  transition:border-color var(--dur) var(--ease-out),box-shadow var(--dur) var(--ease-out)}
textarea{height:auto;padding:10px 11px;line-height:var(--leading-normal);resize:vertical}
input:hover,select:hover,textarea:hover{border-color:var(--text-faint)}
input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-subtle)}
input::placeholder,textarea::placeholder{color:var(--text-faint)}
input[type=number]{width:84px;text-align:center}
select{cursor:pointer}
label.fld{display:flex;flex-direction:column;gap:5px;font-size:var(--text-sm);color:var(--text-muted);font-weight:var(--weight-medium)}
button.btn{font-family:var(--font-sans);font-size:var(--text-sm);font-weight:var(--weight-semibold);
  border:1px solid var(--border-strong);background:var(--surface);color:var(--text);height:var(--control-md);padding:0 14px;
  border-radius:var(--radius-control);cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:6px;
  white-space:nowrap;transition:var(--transition)}
button.btn:hover{background:var(--surface-hover);border-color:var(--text-faint)}
button.btn.primary{background:var(--accent);border-color:var(--accent);color:var(--accent-fg)}
button.btn.primary:hover{background:var(--accent-hover);border-color:var(--accent-hover)}
button.btn.primary:disabled{opacity:.5;cursor:not-allowed}
button.btn.ghost{background:transparent;border-color:transparent}
button.btn.ghost:hover{background:var(--surface-hover);border-color:transparent}
button.btn.danger{color:var(--danger-text);border-color:transparent;background:transparent}
button.btn.danger:hover{background:var(--danger-subtle);border-color:transparent}
button.btn.sm{height:var(--control-sm);padding:0 10px;font-size:var(--text-xs)}
table{width:100%;border-collapse:collapse;font-size:var(--text-sm)}
th,td{text-align:left;padding:9px 10px;border-bottom:1px solid var(--border-subtle)}
th{font-family:var(--font-mono);font-size:var(--text-2xs);text-transform:uppercase;letter-spacing:var(--tracking-wider);
  color:var(--text-muted);font-weight:var(--weight-medium);border-bottom:1px solid var(--border);white-space:nowrap}
td.num,th.num{text-align:center}
tr:last-child td{border-bottom:0}
.tag{display:inline-block;font-family:var(--font-mono);font-size:var(--text-2xs);font-weight:var(--weight-medium);
  padding:2px 8px;border-radius:var(--radius-sm);letter-spacing:var(--tracking-wide);background:var(--accent-subtle);color:var(--accent-text)}
.tag.bye{background:var(--warning-subtle);color:var(--warning-text)}
.tag.wd{background:var(--danger-subtle);color:var(--danger-text)}
.pill{font-size:var(--text-xs);color:var(--text-muted)}
.empty{color:var(--text-muted);text-align:center;padding:30px 10px}
.pairing{display:grid;grid-template-columns:34px 1fr auto 1fr;gap:10px 12px;align-items:center;
  padding:10px;border:1px solid var(--border);border-radius:var(--radius-lg);margin-bottom:8px;background:var(--bg-subtle)}
.pairing .tb{font-family:var(--font-mono);font-weight:var(--weight-bold);color:var(--text-faint);text-align:center}
.pairing .pname{font-weight:var(--weight-semibold);display:flex;align-items:center;gap:6px;min-width:0}
.pairing .pname.right{justify-content:flex-end;text-align:right}
.pairing .pname small{color:var(--text-muted);font-weight:var(--weight-regular)}
.pairing .ctrl{display:flex;gap:6px;align-items:center;justify-content:center;flex-wrap:wrap}
.pairing.win-l .left{color:var(--success-text)} .pairing.win-r .right{color:var(--success-text)}
.pairing.forf{opacity:.92}
.scorein{width:62px}
.resbtns{display:flex;gap:4px}
.resbtns button{border:1px solid var(--border-strong);background:var(--surface);border-radius:var(--radius-sm);height:var(--control-sm);
  padding:0 9px;cursor:pointer;font-weight:var(--weight-semibold);font-size:var(--text-sm);color:var(--text-muted);min-width:34px;transition:var(--transition)}
.resbtns button:hover{border-color:var(--text-faint);color:var(--text)}
.resbtns button.on{background:var(--accent);border-color:var(--accent);color:var(--accent-fg)}
.special{font-size:var(--text-xs);height:var(--control-sm);padding:0 6px}
.win-dot{width:8px;height:8px;border-radius:50%;background:var(--success);flex:0 0 auto}
.note{font-size:var(--text-sm);color:var(--text-muted)}
.banner{padding:10px 12px;border-radius:var(--radius-md);font-size:var(--text-sm);margin-bottom:12px;border:1px solid transparent}
.banner.info{background:var(--accent-subtle);border-color:var(--accent-border);color:var(--text)}
.banner.warn{background:var(--warning-subtle);color:var(--warning-text)}
.banner.good{background:var(--success-subtle);color:var(--success-text)}
.checks{display:flex;flex-direction:column;gap:10px}
.check{display:flex;gap:10px;align-items:flex-start;cursor:pointer;font-size:var(--text-sm)}
.check input{margin-top:2px;height:auto}
.check .desc{color:var(--text-muted);font-size:var(--text-xs);display:block}
.rank{font-family:var(--font-mono);font-weight:var(--weight-bold);color:var(--text-faint);width:24px;text-align:center}
.firsttag{font-family:var(--font-mono);font-size:var(--text-2xs);color:var(--text-muted);border:1px solid var(--border-strong);border-radius:var(--radius-xs);padding:0 4px}
.toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
.inactive{opacity:.55}
.kbd{font-family:var(--font-mono);background:var(--surface);border:1px solid var(--border-strong);border-radius:var(--radius-xs);padding:1px 5px;font-size:var(--text-xs)}
hr.sep{border:0;border-top:1px solid var(--border);margin:14px 0}
/* crosstable */
.cxwrap{overflow:auto}
table.cx{font-size:var(--text-sm);white-space:nowrap}
table.cx th,table.cx td{padding:6px 8px;border:1px solid var(--border)}
table.cx td.cell{text-align:center;font-variant-numeric:tabular-nums;min-width:46px}
.cell .res{font-weight:var(--weight-bold)}
.cell .res.w{color:var(--success-text)} .cell .res.l{color:var(--danger-text)} .cell .res.d{color:var(--text-muted)}
.cell .op{color:var(--text-muted);font-size:var(--text-2xs);font-family:var(--font-mono)}
.cell.bye{color:var(--warning-text);font-weight:var(--weight-bold)}
.cell.absent{color:var(--text-faint)}
/* tiebreak order editor */
.tblist{display:flex;flex-direction:column;gap:6px}
.tbitem{display:flex;align-items:center;gap:8px;border:1px solid var(--border);border-radius:var(--radius-md);padding:7px 10px;background:var(--bg-subtle)}
.tbitem .ord{font-family:var(--font-mono);font-weight:var(--weight-bold);color:var(--text-faint);width:18px;text-align:center}
.tbitem .nm{flex:1;font-weight:var(--weight-medium);font-size:var(--text-sm)}
.tbitem .arrows{display:flex;gap:4px}
.tbadd{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
/* remove the up/down spinners on the score boxes */
.scorein::-webkit-outer-spin-button,.scorein::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.scorein{-moz-appearance:textfield;appearance:textfield}
/* visually hidden but announced by screen readers (live status region) */
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0 0 0 0);white-space:nowrap;border:0}
/* Material Symbols (inline SVG) — size to text, inherit button color */
svg.mi{width:1.15em;height:1.15em;fill:currentColor;flex:0 0 auto;vertical-align:-0.18em}
.resbtns button{display:inline-flex;align-items:center;justify-content:center;gap:3px}
/* 16px controls on touch devices so iOS Safari doesn't auto-zoom on focus */
@media (hover:none) and (pointer:coarse){
  input,select,textarea{font-size:16px!important}
}
/* copy-results toolbar */
.copybar{margin-top:-4px}
.copybar select{max-width:min(60vw,340px)}
/* welcome / session picker */
body.welcome #hdrActions,body.welcome nav.tabs,body.welcome .statusbar{display:none}
.sesslist{display:flex;flex-direction:column;gap:8px}
.sess{display:flex;align-items:center;gap:12px;flex-wrap:wrap;border:1px solid var(--border);border-radius:var(--radius-lg);
  padding:12px 14px;background:var(--bg-subtle);transition:var(--transition)}
.sess:hover{border-color:var(--text-faint);background:var(--surface-hover)}
.sess .meta{flex:1;min-width:0}
.sess .snm{font-weight:var(--weight-semibold)}
.sess .sdt{color:var(--text-muted);font-size:var(--text-xs);font-family:var(--font-mono);margin-top:2px}
.sess .sact{display:flex;gap:6px;flex-wrap:wrap}
@media (max-width:560px){
  .pairing{grid-template-columns:26px 1fr;grid-template-areas:"tb left" "tb right" "tb ctrl";gap:6px}
  .pairing .tb{grid-area:tb} .pairing .left{grid-area:left} .pairing .right{grid-area:right;justify-content:flex-start;text-align:left}
  .pairing .ctrl{grid-area:ctrl;justify-content:flex-start}
  .pairing .vs{display:none}
}
/* ==================================================================
   M3 skin — Material Design 3 look over the Halcyon tokens.
   Noto type, roomier rhythm, pill buttons (filled / tonal / text),
   16px cards, and M3 primary tabs with an active indicator.
   Placed last in this sheet so it wins the cascade.
   ================================================================== */
:root{
  --font-sans:'Noto Sans',system-ui,-apple-system,"Segoe UI",sans-serif;
  --font-mono:'Noto Sans Mono',ui-monospace,Consolas,monospace;
  --radius-card:16px;
  --radius-control:12px;
  --control-md:40px;
  --control-sm:32px;
}
.wrap{padding:24px 18px 96px}
header.app{margin-bottom:20px;gap:16px}
.logo{width:44px;height:44px;border-radius:14px}
.logo svg.mi{width:24px;height:24px;fill:var(--accent-fg)}
header.app h1{font-size:var(--text-2xl,1.4rem)}
/* status chips */
.statusbar{gap:12px;margin-bottom:18px}
.stat{padding:12px 18px;border-radius:14px;min-width:104px;border-color:var(--border-subtle)}
.stat .k{margin-bottom:2px}
/* M3 primary tabs: flat bar, icon+label, rounded 3px active indicator */
nav.tabs{background:transparent;border:0;border-bottom:1px solid var(--border);border-radius:0;
  padding:0;gap:4px;box-shadow:none;margin-bottom:20px}
nav.tabs button{position:relative;display:inline-flex;align-items:center;justify-content:center;gap:7px;
  padding:12px 16px;border-radius:12px 12px 0 0;font-weight:var(--weight-medium)}
nav.tabs button svg.mi{width:1.25em;height:1.25em}
nav.tabs button:hover{background:var(--surface-hover);color:var(--text)}
nav.tabs button.active{background:transparent;color:var(--accent-text);box-shadow:none}
nav.tabs button.active::after{content:"";position:absolute;left:14%;right:14%;bottom:-1px;height:3px;
  border-radius:3px 3px 0 0;background:var(--accent)}
/* cards */
.card{padding:22px;margin-bottom:18px;border-color:var(--border-subtle)}
.card h2{margin:0 0 16px}
hr.sep{margin:20px 0}
.row{gap:10px}
/* buttons: filled / tonal / text, all pills */
button.btn{border-radius:999px;height:var(--control-md);padding:0 20px;
  background:var(--accent-subtle);border:1px solid transparent;color:var(--accent-text)}
button.btn:hover{background:var(--accent-muted,var(--accent-subtle));border-color:transparent;filter:brightness(0.97)}
button.btn.primary{background:var(--accent);color:var(--accent-fg)}
button.btn.primary:hover{background:var(--accent-hover);filter:none}
button.btn.ghost{background:transparent;color:var(--text-muted);padding:0 14px}
button.btn.ghost:hover{background:var(--surface-hover);color:var(--text)}
button.btn.danger{background:transparent;color:var(--danger-text);padding:0 14px}
button.btn.danger:hover{background:var(--danger-subtle)}
button.btn.sm{height:var(--control-sm);padding:0 14px}
button.btn.sm.ghost,button.btn.sm.danger{padding:0 10px}
/* inputs stay rectangular-soft (M3 text fields), controls a touch taller */
input,select,textarea{border-radius:12px}
input[type=number]{width:92px}
.scorein{width:70px}
/* result pills */
.resbtns{gap:6px}
.resbtns button{border-radius:999px;padding:0 13px;min-width:40px;height:var(--control-sm)}
.special{border-radius:999px;padding:0 12px}
/* rows and lists */
.pairing{padding:14px;border-radius:14px;margin-bottom:10px;gap:12px 14px;border-color:var(--border-subtle)}
th,td{padding:12px}
.sess{padding:14px 16px;border-radius:14px;gap:12px;border-color:var(--border-subtle)}
.sesslist{gap:10px}
.tbitem{padding:10px 14px;border-radius:12px;border-color:var(--border-subtle)}
.tblist{gap:8px}
.tbadd{gap:8px;margin-top:12px}
.banner{padding:12px 16px;border-radius:12px;margin-bottom:14px}
.checks{gap:12px}
.toolbar{gap:10px;margin-bottom:14px}
.tag{border-radius:999px;padding:3px 10px}
.firsttag{border-radius:999px;padding:1px 7px}

@media print{
  nav.tabs,header.app .spacer,.toolbar,button,.statusbar,select,.copybar,.banner{display:none!important}
  body{background:#fff;color:var(--neutral-900)} .card{box-shadow:none;border:1px solid var(--neutral-300)}
  /* force light-theme token values so dark-mode prints stay readable on paper */
  [data-theme="dark"]{--text:#26251F;--text-muted:#6E6C62;--text-faint:#A19E92;
    --success-text:#3F7253;--warning-text:#8A6228;--danger-text:#9A463C;--info-text:#3F6E93;--accent-text:#496175;
    --surface:#FFFFFF;--bg-subtle:#F4F4F1;--bg-sunken:#ECEBE6;
    --border:#E2E1DB;--border-subtle:#ECEBE6;--border-strong:#C3C0B6}
  /* crosstable: never clip columns on paper — let it wrap/shrink instead */
  .cxwrap{overflow:visible}
  table.cx{white-space:normal;font-size:10px}
  table.cx th,table.cx td{padding:3px 4px}
  table.cx td.cell{min-width:0}
  /* pairing sheet: winner readable in grayscale, first-move tag crisp */
  .pairing.win-l .left,.pairing.win-r .right{font-weight:800}
  .win-dot{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .firsttag{color:var(--neutral-700)}
}
</style>
</head>
<body>
<div class="wrap">
  <header class="app">
    <div class="logo">S</div>
    <div>
      <h1 id="tname">Match Pairing</h1>
      <div class="sub" id="tsub">Tournament manager</div>
    </div>
    <div class="spacer"></div>
    <div class="row" id="hdrActions">
      <button class="btn ghost sm" id="btnSessions">← Tournaments</button>
      <button class="btn ghost sm" id="btnExport">Export</button>
      <button class="btn ghost sm" id="btnImport">Import</button>
      <input type="file" id="fileImport" accept="application/json" style="display:none">
    </div>
  </header>

  <div class="statusbar" id="statusbar"></div>
  <div id="sr-status" role="status" aria-live="polite" class="sr-only"></div>

  <nav class="tabs" id="tabs" aria-label="Views">
    <button data-tab="players" class="active" aria-current="page">Players</button>
    <button data-tab="pairings">Pairings</button>
    <button data-tab="standings">Standings</button>
    <button data-tab="crosstable">Crosstable</button>
    <button data-tab="settings">Settings</button>
  </nav>

  <div id="view"></div>
</div>

<script>
"use strict";

/* ==================================================================
   Swiss-system tournament manager — single file, client-side.
   Tie-break engine implements the FIDE C.07 (2023) rules and is
   verified against IA Mario Held's official worked examples
   (16-player Swiss: all Buchholz / Buchholz-Cut1 / Sonneborn-Berger
   / SB-Cut1 values reproduced exactly).
   ================================================================== */

const LS_KEY = "swissPairing.v2";
const OLD_KEY = "swissPairing.v1";
const DEFAULT_SETTINGS = {
  totalRounds: 6,
  limitRounds: false,     // cap the number of rounds? (off => generate freely)
  format: "swiss",        // swiss | roundrobin
  round1: "fold",         // fold | adjacent | random
  trackSpread: true,      // Scrabble-style point margins
  drawAllowed: true,
  byePoints: 1,           // points for a pairing-allocated (full) bye
  byeSpread: 50,          // spread credited for a bye / default forfeit margin
  firstBalance: true,     // balance who goes first / colours
  tbOrder: null,          // array of tiebreak keys, in priority order (null => auto)
};

const round2 = x => Math.round((x + Number.EPSILON) * 100) / 100;

/* ------------------------------------------------------------------
   Multi-session store.  Each session is a self-contained tournament
   (name + created date + players/rounds/settings).  `state` points at
   the currently-open session, or is null on the welcome screen.
   ------------------------------------------------------------------ */
/* Deep-coerce a session to expected types. This is the trust boundary for
   imported JSON and hand-edited storage: every value that later reaches
   innerHTML or arithmetic is forced into a safe shape here. */
function normalizeSession(t){
  t = t || {};
  const num = (v,d)=>{ const n=Number(v); return Number.isFinite(n)?n:d; };
  const players = (Array.isArray(t.players)?t.players:[]).map(p=>{
    p = p || {};
    const out = {
      id: num(p.id, 0),
      name: String(p.name ?? "?"),
      rating: (p.rating==null || p.rating==="") ? null : num(p.rating, null),
      active: p.active !== false,
    };
    if(p.byeRequest) out.byeRequest = true;
    return out;
  });
  const BYE_TYPES = {pairing:1, full:1, half:1, zero:1};
  const WINNERS = {p1:1, p2:1, draw:1};
  const rounds = (Array.isArray(t.rounds)?t.rounds:[]).filter(r=>r && Array.isArray(r.pairings)).map((r,i)=>{
    const rd = {
      number: num(r.number, i+1),
      pairings: r.pairings.filter(pg=>pg && pg.p1!=null).map((pg,j)=>{
        const res = pg.result || {};
        return {
          p1: num(pg.p1, 0),
          p2: pg.p2==null ? null : num(pg.p2, 0),
          table: num(pg.table, j+1),
          result: pg.p2==null
            ? {byeType: BYE_TYPES[res.byeType] ? res.byeType : "pairing"}
            : {winner: WINNERS[res.winner] ? res.winner : null,
               forfeit: res.forfeit === true,
               score1: res.score1==null ? null : num(res.score1, null),
               score2: res.score2==null ? null : num(res.score2, null)},
        };
      }),
    };
    if(Array.isArray(r.byeRequests)) rd.byeRequests = r.byeRequests.map(x=>num(x,0));
    if(Array.isArray(r.rrField)) rd.rrField = r.rrField.map(x=>num(x,0));
    return rd;
  });
  const settings = {...DEFAULT_SETTINGS, ...(t.settings && typeof t.settings==="object" ? t.settings : {})};
  settings.totalRounds = Math.max(1, num(settings.totalRounds, DEFAULT_SETTINGS.totalRounds));
  settings.byePoints = num(settings.byePoints, DEFAULT_SETTINGS.byePoints);
  settings.byeSpread = num(settings.byeSpread, DEFAULT_SETTINGS.byeSpread);
  settings.round1 = ({fold:1,adjacent:1,random:1})[settings.round1] ? settings.round1 : "fold";
  settings.format = ({swiss:1,roundrobin:1})[settings.format] ? settings.format : "swiss";
  settings.tbOrder = Array.isArray(settings.tbOrder) ? settings.tbOrder.map(String) : null;
  ["trackSpread","drawAllowed","firstBalance","limitRounds"].forEach(k=> settings[k] = !!settings[k]);
  const exceptions = (Array.isArray(t.exceptions)?t.exceptions:[])
    .map(x=>({round:num(x&&x.round,0), p1:num(x&&x.p1,0), p2:num(x&&x.p2,0)}))
    .filter(x=>x.round>=1 && x.p1>0 && x.p2>0 && x.p1!==x.p2);
  return {
    exceptions,
    ...(typeof t.remoteCode==="string" && t.remoteCode ? {remoteCode: t.remoteCode.slice(0,12)} : {}),
    id: t.id==null ? null : num(t.id, null),
    name: String(t.name || "My Tournament"),
    created: num(t.created, Date.now()),
    updated: num(t.updated, num(t.created, Date.now())),
    players, rounds,
    nextId: Math.max(num(t.nextId, 1), 1, ...players.map(p=>p.id+1)),
    settings,
  };
}
function loadStore(){
  let raw = null, old = null;
  try{
    raw = localStorage.getItem(LS_KEY);
    if(raw){
      const s = JSON.parse(raw);
      s.sessions = (Array.isArray(s.sessions)?s.sessions:[]).map(normalizeSession);
      let mx = 0; s.sessions.forEach(x=>{ if(typeof x.id==="number" && x.id>mx) mx=x.id; });
      s.nextSessionId = Math.max(Number(s.nextSessionId)||0, mx+1);
      s.sessions.forEach(x=>{ if(x.id==null) x.id = s.nextSessionId++; });
      s.currentId = (s.currentId!=null && s.sessions.some(x=>x.id===s.currentId)) ? s.currentId : null;
      return s;
    }
    // migrate a legacy single-tournament save into one session
    old = localStorage.getItem(OLD_KEY);
    if(old){
      const t = normalizeSession({...JSON.parse(old), id:1});
      return {sessions:[t], currentId:null, nextSessionId:2};
    }
  }catch(e){
    // keep the unreadable payload so it can be recovered manually, then start clean
    const bad = raw || old;
    if(bad){
      try{ localStorage.setItem(LS_KEY + ".corrupt", bad); }catch(_){}
      setTimeout(()=>alert("Your saved tournament data could not be read. A backup copy was kept in this browser's local storage under \"" + LS_KEY + ".corrupt\"."), 0);
    }
  }
  return {sessions:[], currentId:null, nextSessionId:1};
}
let store = loadStore();
let state = store.currentId!=null ? store.sessions.find(s=>s.id===store.currentId) : null;
let activeTab = "players";

let saveFailed = false;
function save(){
  if(state) state.updated = Date.now();
  try{ localStorage.setItem(LS_KEY, JSON.stringify(store)); saveFailed = false; }
  catch(e){ saveFailed = true; }
  if(typeof queueSessPush === "function") queueSessPush(); // live session: mirror to the server (no-op otherwise)
}

function createSession(name, dateVal, format){
  const created = dateVal ? new Date(dateVal+"T00:00:00").getTime() : Date.now();
  const s = normalizeSession({id: store.nextSessionId++, name:(name||"").trim()||"Untitled tournament", created, updated:created});
  if(format==="roundrobin" || format==="swiss") s.settings.format = format;
  store.sessions.push(s);
  store.currentId = s.id; state = s; activeTab = "players";
  save(); render();
}
function openSession(id){
  state = store.sessions.find(s=>s.id===id) || null;
  store.currentId = state ? id : null;
  activeTab = "players"; if(state) state._viewRound = null;
  save(); render();
}
function closeSession(){ store.currentId = null; state = null; save(); render(); }
function deleteSession(id){
  store.sessions = store.sessions.filter(s=>s.id!==id);
  if(store.currentId===id){ store.currentId = null; state = null; }
  save(); render();
}
function renameSession(id){
  const s = store.sessions.find(x=>x.id===id); if(!s) return;
  const nm = prompt("Rename tournament:", s.name); if(nm==null) return;
  s.name = nm.trim() || s.name; save(); render();
}

/* tiebreak definitions */
const TB_DEFS = {
  spread:     {label:"Cumulative spread", title:"Sum of point margins (Scrabble-style)"},
  buchholz:   {label:"Buchholz", title:"Sum of opponents' (adjusted) scores"},
  bhCut1:     {label:"Buchholz Cut-1", title:"Buchholz, dropping the least-significant opponent (FIDE default)"},
  sb:         {label:"Sonneborn-Berger", title:"Sum of beaten opponents' scores + half of drawn opponents'"},
  sbCut1:     {label:"Sonneborn-Berger Cut-1", title:"SB dropping the least-significant opponent"},
  cumulative: {label:"Cumulative (progressive)", title:"Sum of running score after each round"},
  wins:       {label:"Number of wins", title:"Most wins ranks higher"},
  headToHead: {label:"Head-to-head", title:"Result of the game(s) between the tied players"},
  rating:     {label:"Rating", title:"Higher rating ranks higher"},
};
function effectiveTbOrder(){
  const o = state.settings.tbOrder;
  // explicit array (even empty = "no tiebreaks") is honoured; unknown keys
  // from imported/hand-edited files are dropped so they can't crash render.
  if(Array.isArray(o)) return o.filter(k=>Object.prototype.hasOwnProperty.call(TB_DEFS, k));
  return state.settings.trackSpread
    ? ["spread","buchholz","sb","cumulative"]
    : ["bhCut1","buchholz","sb","cumulative"];
}

/* ==================================================================
   Round-log builder.  Produces, per player, an ordered list of round
   entries spanning their participation.  Missing rounds within that
   span become "absent" (a voluntarily-unplayed round).
   ================================================================== */
function buildLogs(){
  const cfg = state.settings;
  const byeInfo = t => ({
    pairing:{pts:cfg.byePoints, vol:false, spread:cfg.byeSpread},
    full:   {pts:1,            vol:true,  spread:cfg.byeSpread},
    half:   {pts:0.5,          vol:true,  spread:0},
    zero:   {pts:0,            vol:true,  spread:0},
  }[t] || {pts:cfg.byePoints, vol:false, spread:cfg.byeSpread});

  // For each existing round, map playerId -> entry (or 'pending')
  const perRound = state.rounds.map(rd=>{
    const m = {};
    rd.pairings.forEach(pg=>{
      if(pg.p2===null){
        const t = (pg.result && pg.result.byeType) || "pairing";
        const info = byeInfo(t);
        m[pg.p1] = {oppId:null, pts:info.pts, played:false, voluntary:info.vol,
          result: info.pts>=1?"W":info.pts>0?"D":"L", spread:info.spread, kind:"bye", byeType:t};
        return;
      }
      const r = pg.result || {};
      if(r.forfeit){
        const winSpread = cfg.byeSpread;
        const mk = (pts,res,vol,oppReal)=>({oppId:null, pts, played:false, voluntary:vol, result:res,
          spread: res==="W"?winSpread:res==="L"?-winSpread:0, kind: res==="W"?"ffwin":"ffloss", oppReal});
        if(r.winner==="p1"){ m[pg.p1]=mk(1,"W",false,pg.p2); m[pg.p2]=mk(0,"L",true,pg.p1); }
        else if(r.winner==="p2"){ m[pg.p2]=mk(1,"W",false,pg.p1); m[pg.p1]=mk(0,"L",true,pg.p2); }
        else { m[pg.p1]=mk(0,"L",true,pg.p2); m[pg.p2]=mk(0,"L",true,pg.p1); } // double forfeit
        return;
      }
      if(r.winner){ // played game with a result
        const sp1 = (r.score1!=null && r.score2!=null) ? (r.score1 - r.score2) : 0;
        const v = x => x==="W"?1 : x==="D"?0.5 : 0;
        const w1 = r.winner==="p1"?"W" : r.winner==="draw"?"D" : "L";
        const w2 = r.winner==="p2"?"W" : r.winner==="draw"?"D" : "L";
        m[pg.p1]={oppId:pg.p2, pts:v(w1), played:true, voluntary:false, result:w1, spread:sp1, kind:"game"};
        m[pg.p2]={oppId:pg.p1, pts:v(w2), played:true, voluntary:false, result:w2, spread:-sp1, kind:"game"};
      } else { // paired but not yet scored
        m[pg.p1]="pending"; m[pg.p2]="pending";
      }
    });
    return m;
  });

  // Cover current roster PLUS every id that appears in any round, so a
  // deleted player's history keeps feeding opponents' Buchholz/SB (they are
  // treated like a withdrawal; they never appear in standings themselves).
  const logs = {};
  const allIds = new Set(state.players.map(p=>p.id));
  perRound.forEach(m=> Object.keys(m).forEach(k=> allIds.add(Number(k))));
  allIds.forEach(id=>{
    let first=-1, last=-1;
    perRound.forEach((m,i)=>{ if(m[id]!==undefined){ if(first<0) first=i; last=i; } });
    const arr=[];
    if(first>=0){
      for(let i=first;i<perRound.length;i++){
        const e = perRound[i][id];
        if(e===undefined){ // genuinely not in this round -> absence (voluntary unplayed)
          arr.push({round:i+1, oppId:null, pts:0, played:false, voluntary:true, result:"L", spread:0, kind:"absent"});
        } else if(e==="pending"){
          arr.push({round:i+1, kind:"pending"});
        } else {
          arr.push({round:i+1, ...e});
        }
      }
    }
    logs[id]=arr;
  });
  return logs;
}

/* ==================================================================
   FIDE-2023 tie-break engine (verified). Operates on the round-logs.
   - own unplayed round  -> dummy opponent with the player's own score
   - real opponent       -> their score, with trailing voluntarily-
                            unplayed rounds (no later availability)
                            counted as draws
   - Cut-1               -> discard the least-significant opponent's
                            contribution; if any voluntarily-unplayed
                            rounds exist, discard the larger of {smallest
                            such contribution, least-significant opponent}
   ================================================================== */
function tiebreakEngine(logs){
  const ids = Object.keys(logs).filter(id=>logs[id].length);
  const scored = g => g.kind!=="pending";
  const isAvail = g => g.played || (scored(g) && !g.voluntary); // played, PAB or forfeit-win

  const score = {}, adj = {};
  ids.forEach(id=> score[id] = logs[id].reduce((t,g)=> t + (scored(g)?g.pts:0), 0));
  ids.forEach(id=>{
    const L = logs[id]; let a=0;
    for(let i=0;i<L.length;i++){
      const g=L[i]; if(!scored(g)) continue;
      let pts=g.pts;
      if(!g.played && g.voluntary){
        let later=false;
        for(let j=i+1;j<L.length;j++){ if(isAvail(L[j])){ later=true; break; } }
        if(!later) pts=0.5;
      }
      a+=pts;
    }
    adj[id]=a;
  });
  const cut = rounds => {
    if(!rounds.length) return 0;
    let low = rounds[0];
    for(const r of rounds){ if(r.sig<low.sig || (r.sig===low.sig && r.contrib<low.contrib)) low=r; }
    const v = rounds.filter(r=>r.isVUR);
    return v.length ? Math.max(Math.min(...v.map(r=>r.contrib)), low.contrib) : low.contrib;
  };
  const sum = a => a.reduce((t,x)=>t+x,0);

  const tb={};
  ids.forEach(id=>{
    const L=logs[id], sP=score[id];
    const rounds = L.filter(scored).map(g=>{
      // ?? 0 guards inconsistent imported data (opponent id in no round map)
      const sig = g.played ? (adj[g.oppId] ?? 0) : sP;
      return {sig, isVUR: !g.played && g.voluntary, bh:sig, sb:g.pts*sig};
    });
    const bh = sum(rounds.map(r=>r.bh));
    const sb = sum(rounds.map(r=>r.sb));
    tb[id]={
      buchholz: round2(bh),
      bhCut1:   round2(bh - cut(rounds.map(r=>({sig:r.sig,contrib:r.bh,isVUR:r.isVUR})))),
      sb:       round2(sb),
      sbCut1:   round2(sb - cut(rounds.map(r=>({sig:r.sig,contrib:r.sb,isVUR:r.isVUR})))),
    };
  });
  return tb;
}

/* ---------------- Aggregate stats per player ---------------- */
function computeStats(){
  const logs = buildLogs();
  const tb = tiebreakEngine(logs);
  const S = {};
  state.players.forEach(p=>{
    const L = logs[p.id] || [];
    let points=0, spread=0, wins=0, losses=0, draws=0, byes=0, played=0, cumulative=0, running=0;
    const opponents = new Set();
    L.forEach(g=>{
      if(g.kind==="pending") return;
      points += g.pts; spread += g.spread||0;
      running += g.pts; cumulative += running;
      if(g.kind==="game"){ played++; opponents.add(g.oppId);
        if(g.result==="W") wins++; else if(g.result==="L") losses++; else draws++; }
      else if(g.kind==="bye"){ byes++; }
      else if(g.kind==="ffwin"){ wins++; }
      else if(g.kind==="ffloss"){ losses++; }
    });
    const t = tb[p.id] || {};
    S[p.id] = {id:p.id, points:round2(points), spread, wins, losses, draws, byes, played, cumulative,
      opponents, log:L, firstCount:0,
      buchholz: t.buchholz||0, bhCut1: t.bhCut1||0, sb: t.sb||0, sbCut1: t.sbCut1||0};
  });
  // who went first (for colour/first balancing) — count p1 of any played,
  // decided non-bye game; forfeits are unplayed so they don't use up a "first"
  state.rounds.forEach(rd=> rd.pairings.forEach(pg=>{
    if(pg.p2===null) return;
    if(pg.result && pg.result.winner && !pg.result.forfeit && S[pg.p1]) S[pg.p1].firstCount++;
  }));
  return S;
}

/* ---------------- Standings ----------------
   Ranking is group-wise refinement, not a pairwise comparator: partition by
   points, then refine each still-tied group criterion by criterion. This
   keeps head-to-head transitive (FIDE "direct encounter" mini-score within
   the tied group; circular ties stay tied and fall through). */
function tbValue(e, key){
  switch(key){
    case "spread": return e.s.spread;
    case "buchholz": return e.s.buchholz;
    case "bhCut1": return e.s.bhCut1;
    case "sb": return e.s.sb;
    case "sbCut1": return e.s.sbCut1;
    case "cumulative": return e.s.cumulative;
    case "wins": return e.s.wins;
    case "rating": return e.p.rating||0;
    default: return 0;
  }
}
function partitionDesc(arr, val){ // stable partition into groups by value, descending
  const m = new Map();
  arr.forEach(e=>{ const v=val(e); if(!m.has(v)) m.set(v,[]); m.get(v).push(e); });
  return [...m.entries()].sort((a,b)=>b[0]-a[0]).map(en=>en[1]);
}
function standings(){
  const S = computeStats();
  const list = state.players
    .filter(p=> p.active!==false || (S[p.id] && S[p.id].log.length))
    .map(p=>({p, s:S[p.id]}));
  const order = effectiveTbOrder();
  let groups = partitionDesc(list, e=>e.s.points);
  for(const k of order){
    groups = groups.flatMap(g=>{
      if(g.length<2) return [g];
      if(k==="headToHead"){
        const ids = new Set(g.map(e=>e.p.id));
        const mini = new Map(); // points scored in decided games vs the tied group
        g.forEach(e=>{
          let m=0;
          (e.s.log||[]).forEach(gm=>{ if(gm.kind==="game" && ids.has(gm.oppId)) m+=gm.pts; });
          mini.set(e.p.id, m);
        });
        return partitionDesc(g, e=>mini.get(e.p.id));
      }
      return partitionDesc(g, e=>tbValue(e,k));
    });
  }
  const flat = groups.flatMap(g=> g.slice().sort((A,B)=>
    (B.p.rating||0)-(A.p.rating||0) || A.p.name.localeCompare(B.p.name)));
  return {list: flat, S, order};
}

/* ==================================================================
   Pairing engine
   ================================================================== */
function pickBye(active, S){
  const noBye = active.filter(p=> S[p.id].byes===0);
  const pool = noBye.length ? noBye : active.slice();
  pool.sort((a,b)=> S[a.id].points-S[b.id].points || (a.rating||0)-(b.rating||0));
  // prefer the lowest-ranked eligible candidate whose removal still lets the
  // rest be paired without rematches; fall back to the plain lowest.
  for(const cand of pool){
    if(matchPairs(active.filter(p=>p!==cand), S, false)) return cand;
  }
  return pool[0];
}
function foldPair(arr){
  const half = arr.length/2, top=arr.slice(0,half), bot=arr.slice(half), out=[];
  for(let i=0;i<half;i++) out.push([top[i],bot[i]]);
  return out;
}
// Ordered exhaustive backtracking: finds a complete pairing, preferring
// small score gaps and (optionally) avoiding rematches.
function matchPairs(players, S, allowRematch){
  const n = players.length;
  const used = new Array(n).fill(false);
  const out = [];
  let budget = 400000;
  const cost = (i,j)=>{
    let c = Math.abs(S[players[i].id].points - S[players[j].id].points)*1000;
    if(S[players[i].id].opponents.has(players[j].id)) c += 5e6;
    c += Math.abs(i-j);
    return c;
  };
  const partners = i =>{
    const cs=[];
    for(let j=0;j<n;j++) if(j!==i && !used[j]) cs.push(j);
    cs.sort((a,b)=>cost(i,a)-cost(i,b));
    return cs;
  };
  function solve(){
    if(--budget<0) return false;
    const i = used.indexOf(false);
    if(i===-1) return true;
    used[i]=true;
    for(const j of partners(i)){
      if(!allowRematch && S[players[i].id].opponents.has(players[j].id)) continue;
      used[j]=true; out.push([i,j]);
      if(solve()) return true;
      out.pop(); used[j]=false;
    }
    used[i]=false; return false;
  }
  if(solve()) return out.map(([i,j])=>[players[i],players[j]]);
  return null;
}

/* ---------------- Round robin (circle method) ----------------
   Classic rotation: fix one entrant, rotate the rest. Odd fields get a null
   slot = bye, so over one full cycle every player byes exactly once and the
   bye alternates through the field. */
function roundRobinSchedule(ids){
  const arr = ids.slice();
  if(arr.length%2===1) arr.push(null);
  const n = arr.length, half = n/2, roundsN = n-1;
  const fixed = arr[0]; let rest = arr.slice(1);
  const out = [];
  for(let r=0;r<roundsN;r++){
    const cur = [fixed, ...rest], pairs = [];
    for(let i=0;i<half;i++) pairs.push([cur[i], cur[n-1-i]]);
    out.push(pairs);
    rest.unshift(rest.pop());
  }
  return out;
}
const pairKey = (a,b)=> (a==null||b==null) ? null : Math.min(a,b)+"-"+Math.max(a,b);
// fixed-opponent exceptions applicable to a round, among the given player ids
function forcedPairsFor(roundNum, idSet){
  return (state.exceptions||[]).filter(x=>x.round===roundNum && idSet.has(x.p1) && idSet.has(x.p2));
}
/* Emit the round-robin round for roundNum over the given field (ALL active
   players, including any sitting out on a requested bye — the schedule must
   not change shape when someone skips a round). Exceptions pick WHICH base
   round is played now (each pair meets in exactly one base round, so forcing
   a pair = playing its base round); base rounds whose pairs were already
   played are skipped so the rotation self-heals over the cycle. */
function roundRobinRound(roundNum, field){
  const ids = field.map(p=>p.id).sort((a,b)=>a-b);
  const sched = roundRobinSchedule(ids);
  const cycle = sched.length;
  if(!cycle) return {pairs:[], byePlayer:null, forcedConflict:false, ids};
  const playedPairs = new Set();
  state.rounds.forEach(rd=>rd.pairings.forEach(pg=>{ const k=pairKey(pg.p1,pg.p2); if(k) playedPairs.add(k); }));
  const roundHasPlayed = i => sched[i].some(([a,b])=>{ const k=pairKey(a,b); return k && playedPairs.has(k); });
  let idx = (roundNum-1) % cycle;
  let chosen = false, forcedConflict = false;
  const forced = forcedPairsFor(roundNum, new Set(ids));
  if(forced.length){
    const idxs = [...new Set(forced.map(x=> sched.findIndex(rp=> rp.some(([a,b])=> pairKey(a,b)===pairKey(x.p1,x.p2)))))];
    if(idxs.length===1 && idxs[0]>=0){
      if(forced.some(x=>playedPairs.has(pairKey(x.p1,x.p2)))){
        // its base round was already consumed — forcing would replay old games
        flash("That fixed pairing has already been played this cycle — using the regular schedule.","warn");
        forcedConflict = true;
      } else {
        idx = idxs[0]; chosen = true;
        const forcedKeys = new Set(forced.map(x=>pairKey(x.p1,x.p2)));
        const sideRepeat = sched[idx].some(([a,b])=>{
          const k = pairKey(a,b); return k && !forcedKeys.has(k) && playedPairs.has(k);
        });
        if(sideRepeat) flash("Honouring a fixed pairing this round also repeats a match that was already played.","warn");
      }
    } else {
      flash("Fixed pairings for this round can't all happen in one round-robin round — using the regular schedule.","warn");
      forcedConflict = true;
    }
  }
  if(!chosen && roundHasPlayed(idx)){
    const alt = sched.findIndex((_,i)=>!roundHasPlayed(i));
    if(alt>=0) idx = alt;
  }
  const pairs = []; let byePlayer = null;
  sched[idx].forEach(([a,b])=>{
    if(a==null) byePlayer = byId(b);
    else if(b==null) byePlayer = byId(a);
    else pairs.push([byId(a), byId(b)]);
  });
  return {pairs, byePlayer, forcedConflict, ids};
}

function generateNextRound(){
  // hard guard: never pair on incomplete data — a pending game in ANY round
  // drops points from seeding and its pair from the rematch-avoidance set
  const bad = state.rounds.find(rd=>!roundComplete(rd));
  if(bad){ alert(`Round ${bad.number} still has unfinished results — enter them before pairing the next round.`); return; }
  const roundNum = state.rounds.length+1;
  const cfg = state.settings;
  const S = computeStats();
  // stale bye requests of withdrawn players never fire silently on reinstate
  state.players.forEach(p=>{ if(p.active===false) delete p.byeRequest; });
  let active = state.players.filter(p=>p.active!==false);
  if(active.length<2){ alert("Need at least 2 active players."); return; }

  // honour requested byes (half-point) — these players sit out this round
  const requested = active.filter(p=>p.byeRequest);
  active = active.filter(p=>!p.byeRequest);

  let byePlayer=null;
  let pairs;
  let forcedConflict=false;
  const extraByes=[];
  if(cfg.format==="roundrobin"){
    // schedule over the FULL field (bye-requesters included) so a one-round
    // sit-out never changes the rotation; the requester's scheduled opponent
    // gets a bye for that round instead
    const fieldPlayers = active.concat(requested);
    const rr = roundRobinRound(roundNum, fieldPlayers);
    forcedConflict = rr.forcedConflict;
    byePlayer = rr.byePlayer;
    const reqIds = new Set(requested.map(p=>p.id));
    pairs = [];
    rr.pairs.forEach(([a,b])=>{
      const aOut=reqIds.has(a.id), bOut=reqIds.has(b.id);
      if(aOut && bOut) return;             // both sit out; their half-bye rows come from `requested`
      if(aOut) extraByes.push(b);
      else if(bOut) extraByes.push(a);
      else pairs.push([a,b]);
    });
    if(byePlayer && reqIds.has(byePlayer.id)) byePlayer=null;
    // a genuine field change (withdrawal/reinstate/add) rebuilds the rotation —
    // warn once, since some pairs may now repeat while others wait longer
    const prev = state.rounds.length ? state.rounds[state.rounds.length-1].rrField : null;
    if(prev && JSON.stringify(prev)!==JSON.stringify(rr.ids))
      flash("The field changed since last round — the round-robin schedule was rebuilt; some matchups may repeat or shift.","warn");
    state._rrField = rr.ids;
  } else {
    if(roundNum===1){
      if(cfg.round1==="random") shuffle(active);
      else active.sort((a,b)=>(b.rating||0)-(a.rating||0) || a.name.localeCompare(b.name));
    } else {
      active.sort((a,b)=> S[b.id].points-S[a.id].points ||
        (cfg.trackSpread? S[b.id].spread-S[a.id].spread:0) ||
        (b.rating||0)-(a.rating||0));
    }

    // fixed-opponent exceptions: seat these pairs first, pair the rest normally
    const forced = forcedPairsFor(roundNum, new Set(active.map(p=>p.id)));
    const forcedIds = new Set(); const forcedPairs = [];
    forced.forEach(x=>{
      if(forcedIds.has(x.p1) || forcedIds.has(x.p2)) return; // player fixed twice — post-check flags it
      forcedIds.add(x.p1); forcedIds.add(x.p2);
      forcedPairs.push([byId(x.p1), byId(x.p2)]);
    });
    active = active.filter(p=>!forcedIds.has(p.id));

    if(active.length%2===1){ byePlayer=pickBye(active,S); active=active.filter(p=>p!==byePlayer); }

    if(roundNum===1 && cfg.round1==="fold" && active.length){
      pairs = foldPair(active);
    } else if(active.length){
      pairs = matchPairs(active,S,false);
      if(!pairs){
        pairs = matchPairs(active,S,true);
        if(pairs) flash("Some rematches were unavoidable this round.","warn");
      }
    } else pairs = [];
    if(pairs) pairs = forcedPairs.concat(pairs);
    else if(forcedPairs.length && !active.length) pairs = forcedPairs;
  }
  if(!pairs){ alert("Could not generate pairings."); return; }

  const pairings = pairs.map(pr=>{
    let [a,b]=pr;
    if(cfg.firstBalance && S[b.id].firstCount < S[a.id].firstCount) [a,b]=[b,a];
    return {p1:a.id, p2:b.id, result:{winner:null,score1:null,score2:null}};
  });
  // top boards first
  pairings.sort((x,y)=> (S[y.p1].points+S[y.p2].points) - (S[x.p1].points+S[x.p2].points));
  if(byePlayer) pairings.push({p1:byePlayer.id, p2:null, result:{byeType:"pairing"}});
  extraByes.forEach(p=> pairings.push({p1:p.id, p2:null, result:{byeType:"pairing"}}));
  requested.forEach(p=> pairings.push({p1:p.id, p2:null, result:{byeType:"half"}}));
  pairings.forEach((pg,i)=>pg.table=i+1);

  // surface any fixed pairing for this round that could not be honoured —
  // unless the RR generator already flashed a more specific conflict message
  const wanted = (state.exceptions||[]).filter(x=>x.round===roundNum);
  if(wanted.length && !forcedConflict){
    const got = new Set(pairings.filter(pg=>pg.p2!=null).map(pg=>pairKey(pg.p1,pg.p2)));
    const missed = wanted.filter(x=>!got.has(pairKey(x.p1,x.p2)));
    if(missed.length) flash(`Fixed pairing not applied this round: ${missed.map(x=>pname(x.p1)+" vs "+pname(x.p2)).join(", ")} (player withdrawn, on a bye, or conflicting fixes).`,"warn");
  }

  // clear bye requests now they're satisfied; remember them on the round so
  // deleting the round restores them (regeneration honours them again)
  requested.forEach(p=> delete p.byeRequest);

  const newRound = {number:roundNum, pairings, byeRequests: requested.map(p=>p.id)};
  if(state._rrField){ newRound.rrField = state._rrField; delete state._rrField; }
  state.rounds.push(newRound);
  activeTab="pairings"; state._viewRound=null; delete state._editPairs; save(); render();
}

function roundComplete(rd){
  return rd.pairings.every(pg=> pg.p2===null || (pg.result && (pg.result.winner || pg.result.forfeit)));
}

/* ---------------- Result entry ---------------- */
// Re-render without stealing focus: defer past the native focus transition
// (change fires before blur), then refocus the equivalent node in the new DOM.
function renderPreservingFocus(){
  setTimeout(()=>{
    const ae = document.activeElement;
    let sel = null;
    if(ae){
      if(ae.dataset && ae.dataset.act==="score")
        sel = `[data-act="score"][data-r="${ae.dataset.r}"][data-p="${ae.dataset.p}"][data-w="${ae.dataset.w}"]`;
      else if(ae.id) sel = "#"+ae.id;
    }
    render();
    if(sel){
      const el = document.querySelector(sel);
      if(el){ el.focus(); if(el.select && el.tagName!=="SELECT") el.select(); }
    }
  }, 0);
}
function setResult(rIdx,pIdx,winner){
  const pg = state.rounds[rIdx].pairings[pIdx];
  pg.result.forfeit=false; pg.result.winner = winner;
  // drop leftover scores that contradict the chosen winner (stale-spread guard)
  const {score1,score2}=pg.result;
  if(score1!=null && score2!=null){
    const implied = score1>score2?"p1":score2>score1?"p2":"draw";
    if(implied!==winner) pg.result.score1=pg.result.score2=null;
  }
  save(); render();
}
function setScore(rIdx,pIdx,which,val){
  const pg = state.rounds[rIdx].pairings[pIdx];
  pg.result.forfeit=false;
  pg.result[which] = val===""?null:Number(val);
  const {score1,score2}=pg.result;
  // any missing score => no winner yet (a half-edited game is pending again)
  pg.result.winner = (score1!=null && score2!=null)
    ? (score1>score2?"p1":score2>score1?"p2":"draw") : null;
  save(); renderPreservingFocus();
}
function setSpecial(rIdx,pIdx,mode){
  const pg = state.rounds[rIdx].pairings[pIdx]; const r=pg.result;
  if(mode==="none"){ r.forfeit=false; r.winner=null; }
  else if(mode==="p1"){ r.forfeit=true; r.winner="p1"; r.score1=r.score2=null; }
  else if(mode==="p2"){ r.forfeit=true; r.winner="p2"; r.score1=r.score2=null; }
  else if(mode==="double"){ r.forfeit=true; r.winner=null; r.score1=r.score2=null; }
  save(); render();
}
function setByeType(rIdx,pIdx,t){ state.rounds[rIdx].pairings[pIdx].result.byeType=t; save(); render(); }

/* Manual pairing override: put newId into pairing[pIdx][slot]; the player
   previously there moves to wherever newId came from (which may be the bye
   seat, or the other slot of the same board = flip who goes first). Only
   allowed while neither affected board has any result entered. */
function swapPairSlot(rIdx, pIdx, slot, newId){
  const rd = state.rounds[rIdx];
  const dst = rd.pairings[pIdx];
  const oldId = dst[slot];
  if(newId===oldId){ render(); return; }
  let src=null, srcSlot=null;
  rd.pairings.forEach(q=>{
    if(q.p1===newId){ src=q; srcSlot="p1"; }
    else if(q.p2===newId){ src=q; srcSlot="p2"; }
  });
  if(!src){ render(); return; }
  if(!pairingResultEmpty(dst) || !pairingResultEmpty(src)){
    flash("Can't swap: one of the affected boards already has a result entered.","warn");
    render(); return;
  }
  dst[slot]=newId; src[srcSlot]=oldId;
  save(); render();
}

/* ==================================================================
   Copy results to clipboard (up to a chosen match, with whatever
   info has been entered so far).
   ================================================================== */
function fmtDate(ts){ try{ return new Date(ts).toLocaleDateString(undefined,{year:"numeric",month:"short",day:"numeric"}); }catch(e){ return ""; } }
function flatMatches(){
  const out=[];
  state.rounds.forEach((rd,ri)=>{
    rd.pairings.slice().sort((a,b)=>(a.table||0)-(b.table||0)).forEach(pg=>{
      out.push({ri, round:rd.number, table:pg.table||0, pg});
    });
  });
  return out;
}
function shortMatchLabel(pg){ return pg.p2===null ? `${pname(pg.p1)} (bye)` : `${pname(pg.p1)} vs ${pname(pg.p2)}`; }
function resultLine(pg){
  const cfg=state.settings, r=pg.result||{};
  if(pg.p2===null){
    const t=r.byeType||"pairing";
    const pts={pairing:cfg.byePoints, full:1, half:0.5, zero:0}[t];
    const lbl={pairing:"bye",full:"full-point bye",half:"half-point bye",zero:"zero-point bye"}[t]||"bye";
    return `${pname(pg.p1)} — ${lbl} (+${pts})`;
  }
  if(r.forfeit){
    if(r.winner==="p1") return `${pname(pg.p1)} def. ${pname(pg.p2)} (forfeit)`;
    if(r.winner==="p2") return `${pname(pg.p2)} def. ${pname(pg.p1)} (forfeit)`;
    return `${pname(pg.p1)} vs ${pname(pg.p2)} — double forfeit`;
  }
  if(!r.winner) return `${pname(pg.p1)} vs ${pname(pg.p2)} — pending`;
  if(cfg.trackSpread && r.score1!=null && r.score2!=null)
    return `${pname(pg.p1)} ${r.score1}–${r.score2} ${pname(pg.p2)}`;
  if(r.winner==="draw") return `${pname(pg.p1)} ½–½ ${pname(pg.p2)}`;
  return r.winner==="p1" ? `${pname(pg.p1)} def. ${pname(pg.p2)}` : `${pname(pg.p2)} def. ${pname(pg.p1)}`;
}
function formatResults(uptoIdx){
  const flat=flatMatches();
  if(!flat.length) return `${state.name}\n(no matches yet)`;
  const end=Math.max(0, Math.min(uptoIdx, flat.length-1));
  const lines=[state.name, fmtDate(state.created), ""];
  let curRound=null;
  for(let i=0;i<=end;i++){
    const m=flat[i];
    if(m.round!==curRound){ if(curRound!==null) lines.push(""); lines.push(`Round ${m.round}`); curRound=m.round; }
    lines.push(`  ${m.table}. ${resultLine(m.pg)}`);
  }
  return lines.join("\n");
}
async function writeClipboard(text){
  try{ if(navigator.clipboard && navigator.clipboard.writeText){ await navigator.clipboard.writeText(text); return true; } }catch(e){}
  try{
    const ta=document.createElement("textarea"); ta.value=text;
    ta.style.position="fixed"; ta.style.top="-1000px"; ta.style.opacity="0";
    document.body.appendChild(ta); ta.focus(); ta.select();
    const ok=document.execCommand("copy"); document.body.removeChild(ta); return ok;
  }catch(e){ return false; }
}
function manualCopyFallback(text){
  const prev = document.activeElement;
  const ov=document.createElement("div");
  ov.style.cssText="position:fixed;inset:0;background:rgba(0,0,0,.4);display:grid;place-items:center;z-index:9999;padding:20px";
  ov.innerHTML=`<div role="dialog" aria-modal="true" aria-label="Copy results" style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-card);box-shadow:0 12px 40px rgba(0,0,0,.28);padding:16px;max-width:540px;width:100%">
    <div style="font-weight:var(--weight-semibold);margin-bottom:6px">Copy results</div>
    <div class="note" style="margin-bottom:8px">Automatic copy was blocked here — select all and copy (Ctrl/Cmd + C).</div>
    <textarea readonly rows="12" style="width:100%;font-family:var(--font-mono)"></textarea>
    <div class="row" style="justify-content:flex-end;margin-top:10px"><button class="btn primary sm" data-close>${icon("check")} Done</button></div>
  </div>`;
  const ta=ov.querySelector("textarea"); ta.value=text;
  const done=ov.querySelector("[data-close]");
  const close=()=>{ document.removeEventListener("keydown",onKey,true); ov.remove(); if(prev&&prev.focus) prev.focus(); };
  const onKey=e=>{
    if(e.key==="Escape"){ e.preventDefault(); close(); }
    else if(e.key==="Tab"){ e.preventDefault(); (document.activeElement===ta?done:ta).focus(); } // 2-stop focus trap
  };
  document.addEventListener("keydown",onKey,true);
  done.onclick=close;
  ov.onclick=e=>{ if(e.target===ov) close(); };
  document.body.appendChild(ov);
  ta.focus(); ta.select();
}
async function copyResults(idx){
  const text=formatResults(idx);
  const ok=await writeClipboard(text);
  if(ok){ if(state){ flash(`Copied ${idx+1} match${idx===0?"":"es"} to clipboard.`,"good"); render(); } }
  else { manualCopyFallback(text); }
}

/* ==================================================================
   Live sessions (Telegram group play): lobby -> organizer runs the normal
   app with every save pushed up; everyone else spectates via polling.
   Identity is server-validated initData; start_param is used only to pick
   WHICH session to open (routing, not authorization).
   ================================================================== */
const SESSION_API = "https://empjrokwgnsfczqpdvrp.supabase.co/functions/v1/session";
let sessMode = false, sessCode = null, sess = null, sessLive = false;
let sessMsg = null, sessBusy = false, sessPollTimer = null, sessPushTimer = null, sessPushFailed = false;

function tgApp(){ const t = window.Telegram && window.Telegram.WebApp; return (t && t.platform && t.platform!=="unknown") ? t : null; }
async function sessCall(op, payload){
  const tg = tgApp();
  const initData = (tg && tg.initData) || window.__testInitData || "";
  const res = await fetch(SESSION_API, {method:"POST", headers:{"content-type":"application/json"},
    body: JSON.stringify({op, initData, code: sessCode, ...(payload||{})})});
  let d = null; try{ d = await res.json(); }catch(e){}
  if(!res.ok || !d){ const err = new Error((d && d.error) || "Network problem — try again."); err.status = res.status; throw err; }
  if(d.session) sess = d;
  return d;
}
function stopSessPoll(){ if(sessPollTimer){ clearInterval(sessPollTimer); sessPollTimer = null; } }
function startSessPoll(ms){
  stopSessPoll();
  sessPollTimer = setInterval(async ()=>{
    if(document.hidden || sessBusy || sessLive) return; // visibility-gated (free-tier rule)
    try{
      const before = sess ? sess.session.status+"|"+sess.session.updatedAt+"|"+JSON.stringify(sess.players) : "";
      const d = await sessCall("get");
      const after = d.session.status+"|"+d.session.updatedAt+"|"+JSON.stringify(d.players);
      if(before !== after) renderSession();
    }catch(e){ /* transient — next tick retries */ }
  }, ms);
}
let sessChatId = null;      // launched from a group (g<chatId>) -> session home for that chat
let sessChatList = null;
function enterSessionMode(code){
  sessMode = true; sessChatId = null; sess = null;
  sessCode = String(code||"").toUpperCase().slice(0,12);
  render();
  // opening a session's link JOINS you (unseated member) — mahjong pattern
  sessCall("open").then(()=>{ renderSession(); startSessPoll(3000); })
    .catch(e=>{ sessMsg = {msg:String(e.message||e), type:"warn"}; renderSession(); });
}
function enterChatHome(chatId){
  sessMode = true; sessChatId = Number(chatId); sess = null; sessCode = null;
  render();
  sessCall("list-by-chat", {tgChatId: sessChatId})
    .then(d=>{ sessChatList = d.sessions||[]; renderSession(); })
    .catch(e=>{ sessChatList = []; sessMsg = {msg:String(e.message||e), type:"warn"}; renderSession(); });
}
/* organizer adopts the server state as a local session and runs the normal app;
   local copy wins if newer (an offline edit not yet pushed), else server wins */
function adoptRemote(d){
  const norm = normalizeSession({...(d.state||{}), id:null, remoteCode:d.session.code});
  let existing = store.sessions.find(s=>s.remoteCode===d.session.code);
  if(existing){
    if((norm.updated||0) > (existing.updated||0)){
      const keep = existing.id;
      Object.keys(existing).forEach(k=>delete existing[k]);
      Object.assign(existing, norm, {id: keep});
    }
  } else {
    norm.id = store.nextSessionId++;
    store.sessions.push(norm);
    existing = norm;
  }
  store.currentId = existing.id; state = existing;
  activeTab = "pairings";
  sessLive = true; stopSessPoll();
  save(); render();
}
function queueSessPush(){
  if(!(sessMode && sessLive && state && state.remoteCode===sessCode)) return;
  if(sessPushTimer) clearTimeout(sessPushTimer);
  sessPushTimer = setTimeout(async ()=>{
    sessPushTimer = null;
    try{
      await sessCall("save", {state: JSON.parse(JSON.stringify(state))});
      if(sessPushFailed){ sessPushFailed = false; render(); }
    }catch(e){
      sessPushFailed = true; render();
      // retry network/server hiccups; a 4xx (session ended, not organizer) stays failed until the next edit
      if(!e.status || e.status >= 500) sessPushTimer = setTimeout(()=>{ sessPushTimer = null; queueSessPush(); }, 5000);
    }
  }, 800);
}
function viewSessionLoading(){ return `<div class="card"><div class="empty">Connecting…</div></div>`; }
function takeSessMsg(){ const b = sessMsg ? `<div class="banner ${sessMsg.type}">${esc(sessMsg.msg)}</div>` : ""; sessMsg = null; return b; }
/* Session home for a Telegram group (launched via g<chatId>): its sessions,
   or create a new one — creating announces the join button into the chat. */
function viewChatHome(){
  const list = sessChatList || [];
  const rows = list.map(s=>`<div class="sess">
      <div class="meta"><div class="snm">${esc(s.name)}</div>
        <div class="sdt">${esc(s.status)} · ${s.players} player${s.players===1?"":"s"} · code ${esc(s.code)}</div></div>
      <div class="sact"><button class="btn primary sm" data-sopen-code="${esc(s.code)}">${icon("folder_open")} Open</button></div>
    </div>`).join("");
  return `<div class="card">
    <h2>New tournament for this group</h2>
    ${takeSessMsg()}
    <div class="row" style="align-items:flex-end;gap:12px">
      <label class="fld" style="flex:1;min-width:180px">Name<input id="chName" placeholder="e.g. Friday Cup" maxlength="60"></label>
      <button class="btn primary" id="chCreate">${icon("add")} Create</button>
    </div>
    <div class="note" style="margin-top:8px">Creating posts a join button into the group chat. Players claim their name or add their own; you start at 3+.</div>
  </div>
  <div class="card">
    <h2>This group's tournaments <span class="hint">${list.length}</span></h2>
    ${list.length ? `<div class="sesslist">${rows}</div>` : `<div class="empty">None yet — create one above.</div>`}
  </div>`;
}
function wireChatHome(){
  const $ = s=>document.getElementById(s);
  if($("chCreate")) $("chCreate").onclick=async ()=>{
    if(sessBusy) return; sessBusy = true;
    try{
      const d = await sessCall("create", {name:$("chName").value, chatId: sessChatId});
      sessChatId = null; sessCode = d.session.code;
      renderSession(); startSessPoll(3000);
    }catch(e){ sessMsg = {msg:String(e.message||e), type:"warn"}; renderSession(); }
    sessBusy = false;
  };
  document.querySelectorAll("[data-sopen-code]").forEach(b=> b.onclick=()=>enterSessionMode(b.dataset.sopenCode));
}
/* Link-first lobby (mahjong pattern): opening = you're in (maybe unseated).
   The roster lists names; "This is me" claims one, or join under a new name;
   anyone in can add placeholder names for players who aren't on Telegram. */
function viewLobby(){
  const s = sess.session, ps = sess.players, me = sess.me;
  const canStart = s.isCreator && ps.length >= 3;
  const rows = ps.map(p=>`<tr>
    <td>${esc(p.name)} ${p.isCreator?'<span class="tag">organizer</span>':''} ${p.mine?'<span class="tag bye">you</span>':''}</td>
    <td class="num">${p.claimed
      ? '<span class="pill">claimed</span>'
      : `<button class="btn sm" data-claim="${esc(p.name)}" ${me?"disabled":""}>This is me</button>${(me||s.isCreator)?` <button class="btn danger sm" data-unrm="${esc(p.name)}" aria-label="Remove ${esc(p.name)}" title="Remove">${icon("close")}</button>`:""}`}</td>
  </tr>`).join("");
  return `<div class="card">
    <h2>${esc(s.name)} <span class="hint">lobby · code ${esc(s.code)}</span></h2>
    ${takeSessMsg()}
    <div class="note" style="margin-bottom:10px">Organizer: ${esc(s.creatorName)} · ${ps.length} on the list · needs 3+ to start${me?` · you are <b>${esc(me)}</b>`:" · you're in as a viewer until you take a name"}</div>
    ${ps.length ? `<table><thead><tr><th>Player</th><th class="num"></th></tr></thead><tbody>${rows}</tbody></table>`
      : `<div class="empty">No names yet — add yours below.</div>`}
    ${!me ? `<div class="row" style="margin-top:12px">
        <input id="lbNick" placeholder="Join as… (your name)" style="flex:1;min-width:140px" maxlength="30">
        <button class="btn primary" id="lbJoin">${icon("add")} Join as new player</button>
      </div>`
    : `<div class="row" style="margin-top:12px">
        <input id="lbRename" placeholder="Rename yourself" style="flex:1;min-width:140px" maxlength="30">
        <button class="btn sm" id="lbDoRename">${icon("edit")} Rename</button>
        ${!s.isCreator ? `<button class="btn danger sm" id="lbLeave">Leave</button>` : ""}
      </div>`}
    <div class="row" style="margin-top:8px">
      <input id="lbAdd" placeholder="Add a player who isn't on Telegram" style="flex:1;min-width:180px" maxlength="30">
      <button class="btn sm" id="lbAddBtn">${icon("playlist_add")} Add name</button>
    </div>
    ${s.isCreator ? `<hr class="sep"><div class="row" style="align-items:flex-end">
      <label class="fld">Format
        <select id="lbFormat"><option value="swiss">Swiss system</option><option value="roundrobin">Round robin</option></select>
      </label>
      <button class="btn primary" id="lbStart" ${canStart?"":"disabled"}>Start tournament</button>
      ${canStart?"":'<span class="pill">3+ names needed</span>'}
    </div>` : ""}
    <div class="note" style="margin-top:10px">${s.isCreator
      ? "Everyone on the list plays (claimed or not). When you start, you run the tournament from this device — the group gets live standings."
      : "Once the organizer starts, this page shows live pairings and standings."}</div>
  </div>`;
}
function wireLobby(){
  const $ = s=>document.getElementById(s);
  const act = async fn=>{
    if(sessBusy) return;
    sessBusy = true;
    try{ await fn(); }catch(e){ sessMsg = {msg:String(e.message||e), type:"warn"}; }
    sessBusy = false;
    renderSession();
  };
  document.querySelectorAll("[data-claim]").forEach(b=> b.onclick=()=>act(()=>sessCall("claim",{player:b.dataset.claim})));
  document.querySelectorAll("[data-unrm]").forEach(b=> b.onclick=()=>act(()=>sessCall("remove-name",{name:b.dataset.unrm})));
  if($("lbJoin")) $("lbJoin").onclick=()=>act(()=>sessCall("join-new",{name:$("lbNick").value}));
  if($("lbNick")) $("lbNick").onkeydown=e=>{ if(e.key==="Enter") $("lbJoin").click(); };
  if($("lbDoRename")) $("lbDoRename").onclick=()=>act(()=>sessCall("rename",{newName:$("lbRename").value}));
  if($("lbLeave")) $("lbLeave").onclick=()=>act(()=>sessCall("leave"));
  if($("lbAddBtn")) $("lbAddBtn").onclick=()=>act(()=>sessCall("add-name",{name:$("lbAdd").value}));
  if($("lbStart")) $("lbStart").onclick=()=>act(async ()=>{ const d = await sessCall("start",{format:$("lbFormat").value}); adoptRemote(d); });
}
function viewSpectate(){
  const done = sess.session.status==="done";
  const saved = state;
  let inner = "";
  try{
    state = normalizeSession({...(sess.state||{}), id:null});
    const {list} = standings();
    const rows = list.map((e,i)=>`<tr>
      <td class="rank">${i+1}</td><td>${esc(e.p.name)}</td>
      <td class="num"><b>${e.s.points}</b></td>
      <td class="num">${e.s.wins}-${e.s.losses}${e.s.draws?"-"+e.s.draws:""}</td>
      <td class="num">${fmtSpread(e.s.spread)}</td></tr>`).join("");
    const rd = state.rounds[state.rounds.length-1];
    const pairs = rd ? rd.pairings.map(pg=>{
      if(pg.p2==null) return `<div class="note">${esc(pname(pg.p1))} — bye</div>`;
      const r = pg.result||{};
      const res = r.forfeit ? "forfeit"
        : (r.score1!=null && r.score2!=null) ? `${r.score1} : ${r.score2}`
        : r.winner ? (r.winner==="draw" ? "draw" : (r.winner==="p1" ? "win" : "loss")) : "…";
      return `<div class="note">${esc(pname(pg.p1))} vs ${esc(pname(pg.p2))} — ${res}</div>`;
    }).join("") : "";
    inner = `<div class="card">
      <h2>${esc(state.name)} <span class="hint">${done?"final standings":"live"} · ${state.settings.format==="roundrobin"?"round robin":"Swiss"}</span></h2>
      <div class="cxwrap"><table><thead><tr>
        <th class="rank">#</th><th>Player</th><th class="num">Pts</th><th class="num">W-L</th><th class="num">Spread</th>
      </tr></thead><tbody>${rows}</tbody></table></div>
    </div>
    ${rd?`<div class="card"><h2>Round ${rd.number}${done?"":" <span class=\"hint\">in progress</span>"}</h2>${pairs}</div>`:""}
    <div class="note" style="text-align:center">${done?"Tournament finished.":"Updates automatically while open."}</div>`;
  } finally { state = saved; }
  return inner;
}
function renderSession(){
  if(!sessMode) return;
  if(sessLive){ render(); return; }
  document.body.classList.add("welcome"); // hides tabs/statusbar/header actions
  const v = document.getElementById("view");
  // group home (launched from a chat, no session picked yet)
  if(sessChatId != null && !sessCode){
    document.getElementById("tname").textContent = "Group tournaments";
    document.getElementById("tsub").textContent = "Pick a session or create one";
    v.innerHTML = sessChatList === null ? takeSessMsg() + viewSessionLoading() : viewChatHome();
    if(sessChatList !== null) wireChatHome();
    return;
  }
  document.getElementById("tname").textContent = sess ? sess.session.name : "Session";
  document.getElementById("tsub").textContent = !sess ? "Connecting"
    : sess.session.status==="lobby" ? "Waiting to start"
    : sess.session.status==="done" ? "Finished" : "Live";
  if(!sess){
    v.innerHTML = takeSessMsg() + viewSessionLoading();
    return;
  }
  if(sess.session.status==="lobby"){ v.innerHTML = viewLobby(); wireLobby(); return; }
  if(sess.session.status==="active" && sess.session.isCreator){ adoptRemote(sess); return; }
  v.innerHTML = viewSpectate();
}

  if(state) state._flash={msg,type};
  // mirror into the screen-reader live region (clear-then-set so repeats announce)
  const el=document.getElementById("sr-status");
  if(el){ el.textContent=""; setTimeout(()=>{ el.textContent=msg; },50); }
}
function statusbar(){
  const active = state.players.filter(p=>p.active!==false).length;

  sb.innerHTML =
    cell("Players", active) +
    cell("Round", roundVal) +
    cell("Status", cur===0?"Setup":(roundComplete(state.rounds[cur-1])?"Complete":"In play"));
}
