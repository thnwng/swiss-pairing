function specialMode(r){ return !r.forfeit ? "none" : r.winner==="p1"?"p1" : r.winner==="p2"?"p2" : "double"; }

function pairingResultEmpty(pg){
  const r = pg.result||{};
  return pg.p2===null || (!r.winner && !r.forfeit && r.score1==null && r.score2==null);
}
function isRematch(rIdx,pg){
  if(pg.p2===null) return false;
  return state.rounds.slice(0,rIdx).some(r2=>r2.pairings.some(q=>
    (q.p1===pg.p1&&q.p2===pg.p2)||(q.p1===pg.p2&&q.p2===pg.p1)));
}
function pairingRow(rIdx,pg,pIdx,S,edit){
  const cfg=state.settings;
  const ptsTag = id => (S && S[id]) ? ` <small>${S[id].points}</small>` : "";
  const swappable = edit && pairingResultEmpty(pg);
  const slotSel = (slot,cur)=>{
    const ids=[]; state.rounds[rIdx].pairings.forEach(q=>{ ids.push(q.p1); if(q.p2!=null) ids.push(q.p2); });
    return `<select class="special" data-swap="1" data-r="${rIdx}" data-p="${pIdx}" data-slot="${slot}" aria-label="replace player">
      ${ids.map(id=>`<option value="${id}" ${id===cur?"selected":""}>${esc(pname(id))}</option>`).join("")}
    </select>`;
  };
  if(pg.p2===null){
    const t=(pg.result&&pg.result.byeType)||"pairing";
    const opt=(v,lbl)=>`<option value="${v}" ${v===t?"selected":""}>${lbl}</option>`;
    return `<div class="pairing">
      <div class="tb">${esc(pg.table)}</div>
      <div class="pname left">${swappable?slotSel("p1",pg.p1):esc(pname(pg.p1))+ptsTag(pg.p1)} <span class="tag bye">BYE</span></div>
      <div class="vs pill">—</div>
      <div class="pname right ctrl">
        <select class="special" data-act="byetype" data-r="${rIdx}" data-p="${pIdx}" aria-label="bye type">
          ${opt("pairing",`Pairing bye (+${esc(cfg.byePoints)})`)}${opt("full","Full point (+1)")}${opt("half","Half point (+½)")}${opt("zero","Zero point (0)")}
        </select>
      </div>
    </div>`;
  }
  const r=pg.result||{};
  const rem = isRematch(rIdx,pg) ? ' <span class="tag" title="these players met in an earlier round">rematch</span>' : '';
  if(swappable){
    return `<div class="pairing">
      <div class="tb">${esc(pg.table)}</div>
      <div class="pname left">${slotSel("p1",pg.p1)}${ptsTag(pg.p1)}</div>
      <div class="vs pill">vs</div>
      <div class="pname right">${slotSel("p2",pg.p2)}${ptsTag(pg.p2)}</div>
      ${rem?`<div style="grid-column:1/-1" class="ctrl">${rem.trim()}</div>`:""}
    </div>`;
  }
  const winClass = r.winner==="p1"?"win-l":r.winner==="p2"?"win-r":"";
  const sm = specialMode(r);
  const dot = '<span class="win-dot" role="img" aria-label="winner"></span>';
  let ctrl;
  if(r.forfeit){
    ctrl = `<div class="ctrl"><span class="tag">${sm==="double"?"double forfeit":(r.winner==="p1"?esc(pname(pg.p1)):esc(pname(pg.p2)))+" wins by forfeit"}</span></div>`;
  } else if(cfg.trackSpread){
    ctrl = `<div class="ctrl">
      <input class="scorein" type="number" inputmode="numeric" value="${esc(r.score1??"")}" aria-label="${esc(pname(pg.p1))} score" data-act="score" data-r="${rIdx}" data-p="${pIdx}" data-w="score1" placeholder="—">
      <span class="pill">:</span>
      <input class="scorein" type="number" inputmode="numeric" value="${esc(r.score2??"")}" aria-label="${esc(pname(pg.p2))} score" data-act="score" data-r="${rIdx}" data-p="${pIdx}" data-w="score2" placeholder="—">
    </div>`;
  } else {
    const b=(w,lbl,al)=>`<button class="${r.winner===w?'on':''}" aria-pressed="${r.winner===w}" aria-label="${al}" data-act="res" data-r="${rIdx}" data-p="${pIdx}" data-win="${w}">${lbl}</button>`;
    ctrl = `<div class="ctrl"><div class="resbtns">
      ${b("p1",icon("chevron_left")+"Win",esc(pname(pg.p1))+" wins")}${cfg.drawAllowed?b("draw","Draw","Draw"):""}${b("p2","Win"+icon("chevron_right"),esc(pname(pg.p2))+" wins")}
    </div></div>`;
  }
  const optS=(v,lbl)=>`<option value="${v}" ${v===sm?"selected":""}>${lbl}</option>`;
  const special = `<select class="special" data-act="special" data-r="${rIdx}" data-p="${pIdx}" title="forfeits / no-shows" aria-label="forfeits / no-shows">
      ${optS("none","Played")}${optS("p1",esc(pname(pg.p1))+" by forfeit")}${optS("p2",esc(pname(pg.p2))+" by forfeit")}${optS("double","Double forfeit")}
    </select>`;
  const first = cfg.firstBalance? `<span class="firsttag" title="goes first">1st</span>`:"";
  return `<div class="pairing ${winClass} ${r.forfeit?'forf':''}">
    <div class="tb">${esc(pg.table)}</div>
    <div class="pname left">${r.winner==="p1"?dot:''}${esc(pname(pg.p1))}${ptsTag(pg.p1)} ${first}</div>
    <div class="vs pill">vs</div>
    <div class="pname right">${esc(pname(pg.p2))}${ptsTag(pg.p2)}${r.winner==="p2"?' '+dot:''}</div>
    <div style="grid-column:1/-1" class="ctrl">${ctrl}${rem}${special}</div>
  </div>`;
}

function viewPairings(){
  const cur = state.rounds.length;
  const S = cur>0 ? computeStats() : null;
  const reqCount = state.players.filter(p=>p.active!==false && p.byeRequest).length;
  let head = `<div class="card"><div class="toolbar">`;
  // a pending game in ANY round blocks pairing (not just the last round)
  const incompleteRd = state.rounds.find(rd=>!roundComplete(rd));
  const canStart = !incompleteRd;
  const reachedMax = state.settings.limitRounds && cur>=state.settings.totalRounds;
  head += `<button class="btn primary" id="genRound" ${canStart && !reachedMax?"":"disabled"}>
      ${cur===0?"Generate Round 1":"Generate Round "+(cur+1)}</button>`;
  const shown = state._viewRound||cur;
  const adjustable = cur>0 && shown===cur &&
    state.rounds[cur-1].pairings.some(pairingResultEmpty);
  if(adjustable) head += `<button class="btn ghost" id="adjPairs">${state._editPairs?icon("check")+" Done adjusting":icon("swap_horiz")+" Adjust pairings"}</button>`;
  if(cur>0){
    head += `<button class="btn ghost" id="printR" aria-label="Print pairings" title="Print">${icon("print")}</button>`;
    head += `<button class="btn danger" id="delRound">${icon("delete")} Delete last round</button>`;
  }
  head += `</div>`;
  if(cur>0){
    const flat = flatMatches();
    const opts = flat.map((m,i)=>`<option value="${i}" ${i===flat.length-1?"selected":""}>R${m.round} B${m.table}: ${esc(shortMatchLabel(m.pg))}</option>`).join("");
    head += `<div class="toolbar copybar">
      <span class="pill">Copy results up to</span>
      <select id="copyUpto" aria-label="copy results up to this match">${opts}</select>
      <button class="btn sm" id="copyBtn">${icon("content_copy")} Copy</button>
    </div>`;
  }
  // fixed-opponent exceptions: force a pair to meet in a chosen future round
  {
    const activeP = state.players.filter(p=>p.active!==false);
    const exList = state.exceptions||[];
    if(activeP.length>=2 || exList.length){
      const optsFor = sel => activeP.map((p,i)=>`<option value="${p.id}" ${i===sel?"selected":""}>${esc(p.name)}</option>`).join("");
      head += `<div class="toolbar copybar">
        <span class="pill">Fix a pairing: round</span>
        <input id="exRound" type="number" min="${cur+1}" value="${cur+1}" style="width:64px" aria-label="round number">
        <select id="exP1" aria-label="first player">${optsFor(0)}</select>
        <span class="pill">vs</span>
        <select id="exP2" aria-label="second player">${optsFor(1)}</select>
        <button class="btn sm" id="exAdd">${icon("add")} Fix</button>
      </div>`;
      if(exList.length){
        head += `<div class="toolbar copybar" style="flex-wrap:wrap">` + exList.map((x,i)=>
          `<span class="tag" title="fixed pairing">R${x.round}: ${esc(pname(x.p1))} vs ${esc(pname(x.p2))}
            <button class="btn ghost sm" data-exdel="${i}" aria-label="Remove fixed pairing: round ${x.round}, ${esc(pname(x.p1))} vs ${esc(pname(x.p2))}" style="height:auto;padding:0 3px">${icon("close")}</button></span>`).join(" ") + `</div>`;
      }
    }
  }
  if(state._flash){ head += `<div class="banner ${state._flash.type}">${esc(state._flash.msg)}</div>`; state._flash=null; }
  if(state._editPairs && adjustable) head += `<div class="banner info">Adjusting pairings: pick a different player in any board without results — the two players swap places. Swapping within a board flips who goes first.</div>`;
  if(reqCount) head += `<div class="banner info">${reqCount} player(s) requested a half-point bye — they'll sit out the next round.</div>`;
  if(incompleteRd) head += `<div class="banner warn">Enter all results for round ${incompleteRd.number} before pairing the next.</div>`;
  if(reachedMax && canStart) head += `<div class="banner good">All ${state.settings.totalRounds} rounds complete. See Standings.</div>`;
  head += `</div>`;

  if(cur===0) return head + `<div class="card"><div class="empty">No rounds yet. Add players, then generate Round 1.</div></div>`;

  const sel = state.rounds.map(rd=>`<option value="${rd.number}" ${rd.number===shown?"selected":""}>Round ${rd.number}${roundComplete(rd)?" ✓":""}</option>`).join("");
  const rd = state.rounds[shown-1];
  const rIdx = shown-1;
  const edit = !!state._editPairs && adjustable;
  const body = rd.pairings.map((pg,i)=>pairingRow(rIdx,pg,i,S,edit)).join("");
  return head + `<div class="card">
    <h2>Round ${shown} pairings <span class="hint"><select id="roundSel" aria-label="view round">${sel}</select></span></h2>
    ${body}
  </div>`;
}

function viewStandings(){
  const {list,order}=standings();
  if(!list.length) return `<div class="card"><div class="empty">No players to rank yet.</div></div>`;
  const cols = order.filter(k=>k!=="rating" && k!=="headToHead"); // numeric tiebreak columns to display
  const head = cols.map(k=>`<th class="num" title="${esc(TB_DEFS[k].title)}">${shortTb(k)}</th>`).join("");
  const cellVal = (s,k)=> k==="spread"?fmtSpread(s.spread)
    : k==="wins"?s.wins
    : k==="cumulative"?s.cumulative
    : s[k];
  const rows = list.map((e,i)=>{
    const s=e.s, wd=e.p.active===false;
    return `<tr class="${wd?'inactive':''}">
      <td class="rank">${i+1}</td>
      <td>${esc(e.p.name)} ${e.p.rating?`<span class="pill">${esc(e.p.rating)}</span>`:""}${wd?' <span class="tag wd">wd</span>':''}</td>
      <td class="num"><b>${s.points}</b></td>
      <td class="num">${s.wins}-${s.losses}${s.draws?("-"+s.draws):""}</td>
      ${cols.map(k=>`<td class="num">${cellVal(s,k)}</td>`).join("")}
    </tr>`;
  }).join("");
  const orderTxt = ["Points", ...order.map(k=>TB_DEFS[k].label)].join(" → ");
  const complete = state.rounds.length>0 && state.rounds.every(roundComplete);
  return `<div class="card">
    <div class="toolbar">
      <h2 style="margin:0">Standings</h2><div class="spacer" style="flex:1"></div>
      <button class="btn ghost sm" id="texReport" ${complete?"":"disabled"} title="${complete?"Download a LaTeX (.tex) final report: standings + per-player records (compile with Overleaf or pdflatex)":"Finish all rounds to enable the final report"}">${icon("description")} Report (.tex)</button>
      <button class="btn ghost sm" id="csvStand">${icon("download")} CSV</button>
      <button class="btn ghost sm" id="printS" aria-label="Print standings" title="Print">${icon("print")}</button>
    </div>
    <div class="cxwrap"><table><thead><tr>
      <th class="rank">#</th><th>Player</th><th class="num">Pts</th><th class="num">W-L</th>${head}
    </tr></thead><tbody>${rows}</tbody></table></div>
    <div class="note" style="margin-top:10px">Tiebreaks: ${esc(orderTxt)}. <span class="hint">Adjust order in Settings.</span></div>
  </div>`;
}
function shortTb(k){ return {spread:"Spread",buchholz:"Buch",bhCut1:"Buch-1",sb:"SB",sbCut1:"SB-1",cumulative:"Cum.",wins:"Wins"}[k]||k; }

function viewCrosstable(){
  const {list,S}=standings();
  if(!list.length) return `<div class="card"><div class="empty">Nothing to show yet.</div></div>`;
  const nR = state.rounds.length;
  // stable seed numbers (by rating) for compact opponent references
  const seeds={}; state.players.slice().sort((a,b)=>(b.rating||0)-(a.rating||0)||a.name.localeCompare(b.name))
    .forEach((p,i)=> seeds[p.id]=i+1);
  const cell = (s, rno)=>{
    const g = (s.log||[]).find(x=>x.round===rno);
    if(!g) return `<td class="cell absent">·</td>`;
    if(g.kind==="pending") return `<td class="cell">…</td>`;
    if(g.kind==="absent") return `<td class="cell absent" title="absent / withdrawn">—</td>`;
    if(g.kind==="bye"){ const lbl={pairing:"BYE",full:"BYE",half:"BYE½",zero:"BYE0"}[g.byeType]||"BYE";
      return `<td class="cell bye" title="${esc(g.byeType)} bye">${lbl}</td>`; }
    if(g.kind==="ffwin") return `<td class="cell"><span class="res w">+F</span> <span class="op">${seeds[g.oppReal]||""}</span></td>`;
    if(g.kind==="ffloss") return `<td class="cell"><span class="res l">−F</span> <span class="op">${seeds[g.oppReal]||""}</span></td>`;
    const rc = g.result==="W"?"w":g.result==="L"?"l":"d";
    const sym = g.result==="W"?"W":g.result==="L"?"L":"½";
    const tip = (g.spread? "spread "+fmtSpread(g.spread)+" · ":"")+"vs "+pname(g.oppId);
    return `<td class="cell" title="${esc(tip)}"><span class="res ${rc}">${sym}</span> <span class="op">${seeds[g.oppId]||""}</span></td>`;
  };
  const rhead = Array.from({length:nR},(_,i)=>`<th class="num">${i+1}</th>`).join("");
  const rows = list.map((e,i)=>{
    const s=e.s;
    return `<tr class="${e.p.active===false?'inactive':''}">
      <td class="num">${seeds[e.p.id]}</td>
      <td>${i+1}. ${esc(e.p.name)}</td>
      <td class="num">${esc(e.p.rating||"")}</td>
      ${Array.from({length:nR},(_,r)=>cell(s,r+1)).join("")}
      <td class="num"><b>${s.points}</b></td>
    </tr>`;
  }).join("");
  return `<div class="card">
    <div class="toolbar"><h2 style="margin:0">Crosstable</h2><div class="spacer" style="flex:1"></div>
      <button class="btn ghost sm" id="csvCross">${icon("download")} CSV</button>
      <button class="btn ghost sm" id="printC" aria-label="Print crosstable" title="Print">${icon("print")}</button></div>
    <div class="cxwrap"><table class="cx"><thead><tr>
      <th>No</th><th>Player</th><th class="num">Rtg</th>${rhead}<th class="num">Pts</th>
    </tr></thead><tbody>${rows}</tbody></table></div>
    <div class="note" style="margin-top:10px">Cells show result and opponent's start-number (hover for detail). W/L/½ = win/loss/draw; +F/−F = forfeit; BYE½ = half-point bye.</div>
  </div>`;
}

function render(){
  if(sessMode && !sessLive){ renderSession(); return; }
  const onWelcome = !state;
  document.body.classList.toggle("welcome", onWelcome);
  const v=document.getElementById("view");
  const storageWarn = (saveFailed
    ? '<div class="banner warn">Warning: changes are NOT being saved — browser storage is blocked or full. Use Export to keep a copy.</div>' : '')
    + (sessMode && sessLive && sessPushFailed
    ? '<div class="banner warn">Live sync to the group session is failing — results stay on this device and retry automatically.</div>' : '');
  if(onWelcome){
    document.getElementById("tname").textContent = "Match Pairing";
    document.getElementById("tsub").textContent = "Choose or create a tournament";
    v.innerHTML = storageWarn + viewWelcome();
    wireWelcome();
    return;
  }
  document.getElementById("tname").textContent = state.name;
  const fmtName = state.settings.format==="roundrobin" ? "round robin" : "Swiss";
  document.getElementById("tsub").textContent =
    (state.settings.limitRounds ? `${state.settings.totalRounds}-round ${fmtName}`
      : (state.settings.format==="roundrobin" ? "Round-robin tournament" : "Swiss tournament"))
    + (state.settings.trackSpread?" · spread tracked":"")
    + (sessMode && sessLive && state.remoteCode===sessCode ? ` · LIVE ${sessCode}` : "");
  statusbar();
  document.querySelectorAll("#tabs button").forEach(b=>{
    const on = b.dataset.tab===activeTab;
    b.classList.toggle("active", on);
    if(on) b.setAttribute("aria-current","page"); else b.removeAttribute("aria-current");
  });
  v.innerHTML = storageWarn + (activeTab==="players"?viewPlayers()
    : activeTab==="pairings"?viewPairings()
    : activeTab==="standings"?viewStandings()
    : activeTab==="crosstable"?viewCrosstable()
    : viewSettings());
  wire();
}

/* ==================================================================
   Event wiring
   ================================================================== */
function addPlayer(name,rating,force){
  name=(name||"").trim(); if(!name) return false;
  if(!force && state.players.some(x=>x.name.trim().toLowerCase()===name.toLowerCase())
     && !confirm(`"${name}" is already in the roster. Add anyway?`)) return false;
  const r = (rating==null || String(rating).trim()==="") ? null : Number(rating);
  state.players.push({id:state.nextId++, name, rating:Number.isFinite(r)?r:null, active:true});
  return true;
}
function moveTb(k,dir){
  const order = effectiveTbOrder().slice();
  const i = order.indexOf(k); if(i<0) return;
  const j = dir==="up"?i-1:i+1; if(j<0||j>=order.length) return;
  [order[i],order[j]]=[order[j],order[i]];
  state.settings.tbOrder=order; save(); render();
}
function wireWelcome(){
  const $=s=>document.getElementById(s);
  $("createSess").onclick=()=>createSession($("newName").value, $("newDate").value, $("newFormat").value);
  $("newName").onkeydown=e=>{ if(e.key==="Enter") $("createSess").click(); };
  $("welImport").onclick=()=>document.getElementById("fileImport").click();
  document.querySelectorAll("[data-sopen]").forEach(b=> b.onclick=()=>openSession(Number(b.dataset.sopen)));
  document.querySelectorAll("[data-srename]").forEach(b=> b.onclick=()=>renameSession(Number(b.dataset.srename)));
  document.querySelectorAll("[data-sdel]").forEach(b=> b.onclick=()=>{
    const id=Number(b.dataset.sdel), s=store.sessions.find(x=>x.id===id);
    if(confirm(`Delete "${s?s.name:"this tournament"}"? This cannot be undone.`)) deleteSession(id);
  });
}
function wire(){
  const $ = s=>document.getElementById(s);

  if(activeTab==="players"){
    $("addPlayer").onclick=()=>{
      if(addPlayer($("pName").value,$("pRating").value)){
        save(); render();
        const nm=document.getElementById("pName"); if(nm) nm.focus(); // keep roster entry flowing
      }
    };
    $("pName").onkeydown=e=>{ if(e.key==="Enter") $("addPlayer").click(); };
    $("pRating").onkeydown=e=>{ if(e.key==="Enter") $("addPlayer").click(); };
    $("bulkAdd").onclick=()=>{
      const dups=[];
      $("bulk").value.split(/\r?\n/).forEach(line=>{
        line=line.trim(); if(!line) return;
        const m=line.split(",");
        const nm=(m[0]||"").trim(); if(!nm) return;
        const rt=m[1]?m[1].trim():"";
        if(state.players.some(x=>x.name.trim().toLowerCase()===nm.toLowerCase())) dups.push({name:nm, rating:rt});
        else addPlayer(nm, rt, true);
      });
      if(dups.length && confirm(`${dups.length} name(s) already in the roster: ${dups.map(d=>d.name).join(", ")}. Add them too?`))
        dups.forEach(d=>addPlayer(d.name, d.rating, true));
      save(); render();
    };
    document.querySelectorAll("[data-act]").forEach(el=>{
      el.onclick=()=>{
        const id=Number(el.dataset.id), act=el.dataset.act, p=byId(id);
        if(act==="del"){
          // hard-deleting a paired player would poison opponents' tiebreaks —
          // their history must stay; withdrawal is the correct tool
          const paired = state.rounds.some(rd=>rd.pairings.some(pg=>pg.p1===id||pg.p2===id));
          if(paired){ alert("This player already appears in a round's pairings. Use Withdraw instead — their games and opponents' tiebreaks stay correct."); return; }
          if(!confirm(`Delete ${p.name}?`)) return;
          state.players=state.players.filter(x=>x.id!==id);
        } else if(act==="toggle"){ p.active = p.active===false; delete p.byeRequest; }
        else if(act==="bye"){ if(p.byeRequest) delete p.byeRequest; else p.byeRequest = true; }
        else if(act==="edit"){
          const nm = prompt("Name:", p.name); if(nm==null) return;
          const newName = nm.trim()||p.name;
          if(newName.toLowerCase()!==p.name.trim().toLowerCase() &&
             state.players.some(x=>x.id!==id && x.name.trim().toLowerCase()===newName.toLowerCase()) &&
             !confirm(`"${newName}" is already in the roster. Use it anyway?`)) return;
          p.name = newName;
          const rt = prompt("Rating (blank = none):", p.rating??"");
          if(rt!=null){ const v=rt.trim(); p.rating = v===""?null:(Number.isFinite(Number(v))?Number(v):p.rating); }
        }
        save(); render();
      };
    });
  }

  if(activeTab==="pairings"){
    if($("genRound")) $("genRound").onclick=generateNextRound;
    if($("delRound")) $("delRound").onclick=()=>{ if(confirm("Delete the last round and its results?")){
      const rd=state.rounds.pop();
      // restore the half-point bye requests this round had consumed
      ((rd&&rd.byeRequests)||[]).forEach(pid=>{ const p=byId(pid); if(p) p.byeRequest=true; });
      state._viewRound=null; delete state._editPairs; save(); render(); } };
    if($("adjPairs")) $("adjPairs").onclick=()=>{ state._editPairs=!state._editPairs; render(); };
    if($("printR")) $("printR").onclick=()=>window.print();
    if($("roundSel")) $("roundSel").onchange=e=>{ state._viewRound=Number(e.target.value); render(); };
    document.querySelectorAll('[data-act="res"]').forEach(b=> b.onclick=()=>setResult(+b.dataset.r,+b.dataset.p,b.dataset.win));
    document.querySelectorAll('[data-act="score"]').forEach(inp=> inp.onchange=()=>setScore(+inp.dataset.r,+inp.dataset.p,inp.dataset.w,inp.value));
    document.querySelectorAll('[data-act="special"]').forEach(s=> s.onchange=()=>setSpecial(+s.dataset.r,+s.dataset.p,s.value));
    document.querySelectorAll('[data-act="byetype"]').forEach(s=> s.onchange=()=>setByeType(+s.dataset.r,+s.dataset.p,s.value));
    document.querySelectorAll('[data-swap]').forEach(s=> s.onchange=()=>swapPairSlot(+s.dataset.r,+s.dataset.p,s.dataset.slot,Number(s.value)));
    if($("copyBtn")) $("copyBtn").onclick=()=>{ const sel=$("copyUpto"); copyResults(sel?Number(sel.value):flatMatches().length-1); };
    if($("exAdd")) $("exAdd").onclick=()=>{
      const r=Number($("exRound").value), a=Number($("exP1").value), b=Number($("exP2").value);
      if(!state.exceptions) state.exceptions=[];
      if(!Number.isFinite(r) || r<=state.rounds.length){ flash("Fixed pairings apply to future rounds only.","warn"); render(); return; }
      if(a===b){ flash("Pick two different players.","warn"); render(); return; }
      if(state.exceptions.some(x=>x.round===r && (x.p1===a||x.p2===a||x.p1===b||x.p2===b))){
        flash("One of those players already has a fixed pairing in that round.","warn"); render(); return;
      }
      state.exceptions.push({round:r, p1:a, p2:b}); save(); render();
    };
    document.querySelectorAll("[data-exdel]").forEach(b=> b.onclick=()=>{ state.exceptions.splice(Number(b.dataset.exdel),1); save(); render(); });
  }

  if(activeTab==="standings"){
    if($("printS")) $("printS").onclick=()=>window.print();
    if($("csvStand")) $("csvStand").onclick=exportStandingsCSV;
    if($("texReport")) $("texReport").onclick=exportLatexReport;
  }
  if(activeTab==="crosstable"){
    if($("printC")) $("printC").onclick=()=>window.print();
    if($("csvCross")) $("csvCross").onclick=exportCrosstableCSV;
  }

  if(activeTab==="settings"){
    $("setName").onchange=e=>{ state.name=e.target.value||"My Tournament"; save(); renderPreservingFocus(); };
    $("setRounds").onchange=e=>{ const mn=state.settings.limitRounds?Math.max(1,state.rounds.length):1; state.settings.totalRounds=Math.max(mn,Number(e.target.value)||1); save(); renderPreservingFocus(); };
    $("setR1").onchange=e=>{ state.settings.round1=e.target.value; save(); };
    $("setFormat").onchange=e=>{ state.settings.format=e.target.value; save(); render(); };
    $("setByeP").onchange=e=>{ state.settings.byePoints=Number(e.target.value)||0; save(); renderPreservingFocus(); };
    $("setByeS").onchange=e=>{ state.settings.byeSpread=Number(e.target.value)||0; save(); renderPreservingFocus(); };
    document.querySelectorAll("[data-set]").forEach(cb=> cb.onchange=()=>{
      state.settings[cb.dataset.set]=cb.checked;
      if(cb.dataset.set==="limitRounds" && cb.checked && state.settings.totalRounds < state.rounds.length) state.settings.totalRounds = state.rounds.length;
      save(); render();
    });
    document.querySelectorAll("[data-tbmove]").forEach(b=> b.onclick=()=>moveTb(b.dataset.k,b.dataset.tbmove));
    document.querySelectorAll("[data-tbremove]").forEach(b=> b.onclick=()=>{ state.settings.tbOrder=effectiveTbOrder().filter(k=>k!==b.dataset.tbremove); save(); render(); });
    document.querySelectorAll("[data-tbadd]").forEach(b=> b.onclick=()=>{ state.settings.tbOrder=[...effectiveTbOrder(), b.dataset.tbadd]; save(); render(); });
    $("resetRounds").onclick=()=>{ if(confirm("Clear all rounds and results? Players are kept.")){ state.rounds=[]; state._viewRound=null; save(); render(); } };
    $("resetAll").onclick=()=>{ if(confirm("Reset this tournament — erase its players, rounds and settings?")){ state.players=[]; state.rounds=[]; state.nextId=1; state.settings={...DEFAULT_SETTINGS}; state._viewRound=null; save(); render(); } };
    if($("endLive")) $("endLive").onclick=async ()=>{
      if(!confirm("End the live session? The group gets a final-standings link and results stop syncing.")) return;
      try{ await sessCall("end"); sessLive=false; startSessPoll(4000); render(); }
      catch(e){ alert(String(e.message||e)); }
    };
  }
}

/* ---------------- Import / Export ---------------- */
function download(filename,text,type){
  const blob=new Blob([text],{type:type||"application/json"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob); a.download=filename; a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),1000);
}
// CSV writer: quotes every cell and neutralizes formula-leading characters in
// strings (=,+,-,@,tab,CR) so a hostile player name can't execute in Excel/Sheets.
function csvBuild(rows){
  return rows.map(r=>r.map(c=>{
    if(typeof c === "number") return `"${c}"`;
    let s = String(c ?? "");
    if(/^[=+\-@\t\r]/.test(s)) s = "'"+s;
    return `"${s.replace(/"/g,'""')}"`;
  }).join(",")).join("\n");
}
function exportStandingsCSV(){
  const {list,order}=standings();
  const cols = order.filter(k=>k!=="rating"&&k!=="headToHead");
  const head=["Rank","Player","Rating","Points","Wins","Losses","Draws", ...cols.map(k=>TB_DEFS[k].label)];
  const rows=list.map((e,i)=>{ const s=e.s;
    return [i+1,e.p.name,e.p.rating||"",s.points,s.wins,s.losses,s.draws,
      ...cols.map(k=> k==="spread"?s.spread : k==="wins"?s.wins : k==="cumulative"?s.cumulative : s[k])]; });
  download((state.name||"standings")+"-standings.csv",csvBuild([head,...rows]),"text/csv");
}
function exportCrosstableCSV(){
  const {list}=standings();
  const nR = state.rounds.length;
  const seeds={}; state.players.slice().sort((a,b)=>(b.rating||0)-(a.rating||0)||a.name.localeCompare(b.name))
    .forEach((p,i)=> seeds[p.id]=i+1);
  const head=["No","Player","Rtg",...Array.from({length:nR},(_,i)=>"R"+(i+1)),"Pts"];
  const code = g=>{
    if(!g || g.kind==="pending") return "";
    if(g.kind==="absent") return "-";
    if(g.kind==="bye") return {pairing:"BYE",full:"BYE",half:"BYE:half",zero:"BYE:zero"}[g.byeType]||"BYE";
    if(g.kind==="ffwin") return "+F"+(seeds[g.oppReal]||"");
    if(g.kind==="ffloss") return "-F"+(seeds[g.oppReal]||"");
    const r = g.result==="W"?"W":g.result==="L"?"L":"D";
    return r+(seeds[g.oppId]||"");
  };
  const rows=list.map(e=>{
    const s=e.s;
    return [seeds[e.p.id], e.p.name, e.p.rating||"",
      ...Array.from({length:nR},(_,r)=> code((s.log||[]).find(x=>x.round===r+1))),
      s.points];
  });
  download((state.name||"tournament")+"-crosstable.csv",csvBuild([head,...rows]),"text/csv");
}

/* ---------------- Final report (LaTeX / .tex) ----------------
   Emits LaTeX source for the end-of-event report: page 1 = final
   standings (position / name / wins / spread); then one page per
   player = their game-by-game record (round, W-L before, opponent,
   spread, W-L after) with a W-L / total-spread summary row.
   Compile with pdflatex (Overleaf, or a local TeX install) for a PDF.
   Byes/absences follow the app's own accounting: they do not move the
   W-L record but their spread still counts toward the total. */
function latexEsc(s){
  s = String(s ?? "");
  const map = {'\\':'\\textbackslash{}','&':'\\&','%':'\\%','$':'\\$','#':'\\#',
    '_':'\\_','{':'\\{','}':'\\}','~':'\\textasciitilde{}','^':'\\textasciicircum{}'};
  let out=""; for(const ch of s){ out += (map[ch]!==undefined?map[ch]:ch); }
  return out;
}
function texSpread(n){ n = Number(n)||0; return `$${n>0?"+":""}${n}$`; }
function buildLatexReport(){
  const {list} = standings();
  const hasTies = list.some(e=> (e.s && e.s.draws) > 0);
  const rec = (w,l,t)=> hasTies ? `${w}-${l}-${t}` : `${w}-${l}`;
  const dateStr = fmtDate(state.created);
  const O = [];
  O.push("\\documentclass[11pt]{article}");
  O.push("\\usepackage[utf8]{inputenc}");
  O.push("\\usepackage[T1]{fontenc}");
  O.push("\\usepackage[margin=2cm]{geometry}");
  O.push("\\usepackage{longtable}");
  O.push("\\usepackage{booktabs}");
  O.push("\\usepackage{array}");
  O.push("\\setlength{\\parindent}{0pt}");
  O.push("");
  O.push("\\begin{document}");
  O.push("");
  O.push("\\begin{center}");
  O.push(`{\\LARGE\\bfseries ${latexEsc(state.name||"Tournament")}}\\\\[4pt]`);
  O.push("{\\large Final Standings}\\\\[2pt]");
  if(dateStr) O.push(`{\\small ${latexEsc(dateStr)}}`);
  O.push("\\end{center}");
  O.push("\\vspace{8pt}");
  O.push("");
  // Page 1 — final standings
  O.push("\\begin{longtable}{@{}r l r r@{}}");
  O.push("\\toprule");
  O.push("\\# & Player & Wins & Spread\\\\");
  O.push("\\midrule");
  O.push("\\endfirsthead");
  O.push("\\toprule");
  O.push("\\# & Player & Wins & Spread\\\\");
  O.push("\\midrule");
  O.push("\\endhead");
  O.push("\\bottomrule");
  O.push("\\endlastfoot");
  list.forEach((e,i)=>{
    const s=e.s;
    const nm = latexEsc(e.p.name) + (e.p.active===false ? " {\\small (wd)}" : "");
    O.push(`${i+1} & ${nm} & ${s.wins} & ${texSpread(s.spread)}\\\\`);
  });
  O.push("\\end{longtable}");
  O.push("");
  // Pages 2+ — one per player, their game-by-game record
  list.forEach(e=>{
    const s=e.s;
    const rows = (s.log||[]).filter(g=> ["game","bye","ffwin","ffloss","absent"].includes(g.kind));
    if(!rows.length) return;
    O.push("\\newpage");
    O.push(`\\section*{${latexEsc(e.p.name)}}`);
    O.push("\\begin{center}");
    O.push("\\begin{tabular}{@{}r c l r c@{}}");
    O.push("\\toprule");
    O.push("Game & W-L (before) & Opponent & Spread & W-L (after)\\\\");
    O.push("\\midrule");
    let w=0,l=0,t=0;
    rows.forEach(g=>{
      const before = rec(w,l,t);
      if(g.kind==="game"){ if(g.result==="W") w++; else if(g.result==="L") l++; else t++; }
      else if(g.kind==="ffwin") w++;
      else if(g.kind==="ffloss") l++;
      const after = rec(w,l,t);
      let opp;
      if(g.kind==="bye") opp = "Bye" + (g.byeType==="half"?" ($\\frac{1}{2}$)":g.byeType==="zero"?" (0)":"");
      else if(g.kind==="ffwin"||g.kind==="ffloss") opp = latexEsc(pname(g.oppReal))+" (forfeit)";
      else if(g.kind==="absent") opp = "(absent)";
      else opp = latexEsc(pname(g.oppId));
      O.push(`${g.round} & ${before} & ${opp} & ${texSpread(g.spread)} & ${after}\\\\`);
    });
    O.push("\\midrule");
    O.push(`\\multicolumn{3}{@{}r}{\\textbf{Total}} & \\textbf{${texSpread(s.spread)}} & \\textbf{${rec(w,l,t)}}\\\\`);
    O.push("\\bottomrule");
    O.push("\\end{tabular}");
    O.push("\\end{center}");
    O.push("");
  });
  O.push("\\end{document}");
  return O.join("\n");
}
function exportLatexReport(){
  const fname = (state.name||"tournament").replace(/[^\w.-]+/g,"_")+"-report.tex";
  download(fname, buildLatexReport(), "application/x-tex;charset=utf-8");
}

  rd.onload=()=>{ try{
    const t=normalizeSession({...JSON.parse(rd.result), id: store.nextSessionId++});
    store.sessions.push(t); store.currentId=t.id; state=t; activeTab="standings"; save(); render();
  }catch(err){ alert("Invalid file."); } };

};

// Session deep links (mahjong-parity, prefix-typed): startapp=g<chatId> =
// launched from a Telegram group -> that group's session home; a bare code =
// direct join link -> opening it joins the session. The bridge script loads
// async, so hook its event.
(function(){
  const checkStart = ()=>{
    try{
      const tg = tgApp();
      const p = String((tg && tg.initDataUnsafe && tg.initDataUnsafe.start_param) || "");
      if(!p) return;
      const g = p.match(/^g(-?\d+)$/);
      if(g) enterChatHome(Number(g[1]));
      else enterSessionMode(p);
    }catch(e){}
  };
  if(tgApp()) checkStart();
  else document.addEventListener("tg-ready", checkStart, {once:true});
})();
